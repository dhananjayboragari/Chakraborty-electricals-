<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#e0eafc,#cfdef3);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding:30px;
  width:90%;
  max-width:360px;
  border-radius:16px;
  box-shadow:0 15px 30px rgba(0,0,0,0.1);
  text-align:center;
}

.icon-box{
  width:70px;height:70px;
  background:#28a745;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:auto;
}
.icon-box i{color:#fff;font-size:28px;}

.company{
  margin-top:10px;
  color:#28a745;
  font-weight:600;
}

.input-box{position:relative;margin:12px 0;}

.left{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  color:#888;
}

.right{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#888;
}

input{
  width:100%;
  padding:12px 40px;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:#28a745;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:15px;
}

.msg{
  font-size:14px;
  margin-top:10px;
}

.link{
  margin-top:10px;
  display:block;
  color:#007bff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<div class="icon-box">
<i class="fas fa-user-plus"></i>
</div>

<div class="company">M/S Chakraborty Electricals</div>

<h2>Create Account</h2>

<div class="input-box">
<i class="fas fa-envelope left"></i>
<input id="email" placeholder="Email">
</div>

<div class="input-box">
<i class="fas fa-lock left"></i>
<input id="password" type="password" placeholder="Password">
<i class="fas fa-eye right" onclick="toggle('password',this)"></i>
</div>

<div class="input-box">
<i class="fas fa-lock left"></i>
<input id="confirm" type="password" placeholder="Confirm Password">
<i class="fas fa-eye right" onclick="toggle('confirm',this)"></i>
</div>

<button onclick="signup()">Sign Up</button>

<div id="msg" class="msg"></div>

<span class="link" onclick="location.href='index.html'">Back to Login</span>

</div>

<script>
// 👁 toggle password
function toggle(id,icon){
let p=document.getElementById(id);
if(p.type==="password"){
  p.type="text";
  icon.classList.replace("fa-eye","fa-eye-slash");
}else{
  p.type="password";
  icon.classList.replace("fa-eye-slash","fa-eye");
}
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain:"chakraborty-ele-login.firebaseapp.com",
  projectId:"chakraborty-ele-login"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth();

// 🔥 SIGNUP FUNCTION
window.signup=function(){
let email=document.getElementById("email").value.trim();
let pass=document.getElementById("password").value;
let conf=document.getElementById("confirm").value;
let msg=document.getElementById("msg");

// ✅ validation
if(email==="" || pass==="" || conf===""){
  msg.innerHTML="❌ All fields required";
  msg.style.color="red";
  return;
}

if(pass!==conf){
  msg.innerHTML="❌ Password not match";
  msg.style.color="red";
  return;
}

if(pass.length<6){
  msg.innerHTML="❌ Password must be 6+ characters";
  msg.style.color="red";
  return;
}

// 🔥 FIREBASE
createUserWithEmailAndPassword(auth,email,pass)
.then((userCredential)=>{
  const user = userCredential.user;

  // ✅ send verification email
  sendEmailVerification(user)
  .then(()=>{
    msg.innerHTML="✅ Account Created! Check your email to verify.";
    msg.style.color="green";

    setTimeout(()=>{
      window.location.href="index.html";
    },2000);
  })
  .catch(err=>{
    console.log(err);
    msg.innerHTML="❌ Verification email failed: "+err.message;
    msg.style.color="red";
  });

})
.catch(e=>{
  console.log(e);
  let customMsg="❌ "+e.message;
  if(e.code==="auth/email-already-in-use") customMsg="❌ Email already in use.";
  msg.innerHTML=customMsg;
  msg.style.color="red";
});
}
</script>

</body>
</html>

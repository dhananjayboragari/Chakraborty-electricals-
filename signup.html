<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup Page</title>
</head>
<body>

<h2>Signup</h2>

<input type="text" id="name" placeholder="Enter Name"><br><br>
<input type="email" id="email" placeholder="Enter Email"><br><br>
<input type="password" id="password" placeholder="Enter Password (6+ chars)"><br><br>

<button onclick="signup()">Signup</button>

<p>Already have account? <a href="login.html">Login</a></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain: "chakraborty-ele-login.firebaseapp.com",
  projectId: "chakraborty-ele-login",
  storageBucket: "chakraborty-ele-login.firebasestorage.app",
  messagingSenderId: "414542805581",
  appId: "1:414542805581:web:cfd13593767abbb51cba04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async function() {
  try {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if(!name || !email || !password){
      alert("All fields are required!");
      return;
    }

    if(password.length < 6){
      alert("Password must be at least 6 characters!");
      return;
    }

    // 🔥 Create user
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    // 🔥 Save in Firestore
    await setDoc(doc(db, "users", user.uid), {
      name: name,
      email: email,
      photo: ""
    });

    alert("Signup Success ✅");
    window.location.href = "login.html";

  } catch(error) {
    console.error(error);
    alert("Signup Failed: " + error.message);
  }
}
</script>

</body>
</html>

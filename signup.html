<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#e0eafc,#cfdef3);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  padding:30px 25px;
  width:90%;
  max-width:360px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  text-align:center;
}
.icon-box{
  width:80px;height:80px;
  background:#28a745;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0 auto 15px;
}
.icon-box i{color:#fff;font-size:32px;}
.company{color:#28a745;font-weight:600;margin-bottom:15px;font-size:18px;}
.input-box{position:relative;margin:12px 0;}
.left,.right{position:absolute;top:50%;transform:translateY(-50%);color:#888;}
.left{left:12px;}
.right{right:12px;cursor:pointer;}
input{width:100%;padding:14px 45px;border:1px solid #ccc;border-radius:12px;font-size:15px;outline:none;}
input:focus{border-color:#28a745;box-shadow:0 0 5px rgba(40,167,69,0.2);}
button{width:100%;padding:14px;background:#28a745;color:#fff;border:none;border-radius:12px;font-size:16px;margin-top:12px;cursor:pointer;}
button:hover{background:#218838;}
.msg{margin-top:12px;font-size:14px;min-height:18px;}
.success{color:green;}
.error{color:red;}
.link{display:block;margin-top:12px;color:#007bff;cursor:pointer;text-decoration:underline;}

/* 🔥 Toast */
#toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:14px 20px;
  border-radius:10px;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
  z-index:9999;
}
#toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="card">
  <div class="icon-box"><i class="fas fa-user-plus"></i></div>
  <div class="company">M/S Chakraborty Electricals</div>
  <h2>Create Account</h2>

  <div class="input-box">
    <i class="fas fa-envelope left"></i>
    <input id="email" placeholder="Email">
  </div>

  <div class="input-box">
    <i class="fas fa-lock left"></i>
    <input id="password" type="password" placeholder="Password">
    <i class="fas fa-eye right" onclick="toggle('password',this)"></i>
  </div>

  <div class="input-box">
    <i class="fas fa-lock left"></i>
    <input id="confirm" type="password" placeholder="Confirm Password">
    <i class="fas fa-eye right" onclick="toggle('confirm',this)"></i>
  </div>

  <button onclick="signup()">Sign Up</button>

  <div id="msg" class="msg"></div>
  <span class="link" onclick="location.href='index.html'">Back to Login</span>
</div>

<!-- 🔥 Toast -->
<div id="toast"></div>

<script>
function toggle(id,icon){
  let p=document.getElementById(id);
  if(p.type==="password"){
    p.type="text";
    icon.classList.replace("fa-eye","fa-eye-slash");
  }else{
    p.type="password";
    icon.classList.replace("fa-eye-slash","fa-eye");
  }
}

// 🔥 Toast Function
function showToast(message, color="#333"){
  const toast = document.getElementById("toast");
  toast.innerHTML = message;
  toast.style.background = color;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },4000);
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain:"chakraborty-ele-login.firebaseapp.com"
});

const auth = getAuth();
let currentUser=null;

window.signup = async function(){
  const email=document.getElementById("email").value.trim();
  const pass=document.getElementById("password").value;
  const conf=document.getElementById("confirm").value;
  const msg=document.getElementById("msg");

  msg.style.color="red";

  if(!email || !pass || !conf){
    msg.innerHTML="❌ All fields required";
    return;
  }

  if(pass!==conf){
    msg.innerHTML="❌ Password not match";
    return;
  }

  if(pass.length<6){
    msg.innerHTML="❌ Password must be 6+ characters";
    return;
  }

  try{
    const userCredential = await createUserWithEmailAndPassword(auth,email,pass);
    currentUser = userCredential.user;

    await sendEmailVerification(currentUser);

    // 🔥 Toast Success Message
    showToast(
      "✅ Account Created!<br>\
      <i class='fas fa-envelope-open-text'></i> Check inbox or Spam folder.<br>\
      <i class='fas fa-shield-alt'></i> Spam open করে \"Not Spam\" click করো → next time Inbox-এ আসবে",
      "#28a745"
    );

    msg.innerHTML="";

  }catch(e){
    msg.innerHTML="❌ "+e.message;
  }
}
</script>

</body>
</html>

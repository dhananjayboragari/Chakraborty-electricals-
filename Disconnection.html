<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* TITLE */
.titleWrap{
overflow:hidden;
white-space:nowrap;
background:#020617;
padding:8px 10px;
}

.titleScroll{
display:inline-block;
padding-left:100%;
animation:scrollText 12s linear infinite;
color:#38bdf8;
font-size:16px;
font-weight:bold;
}

@keyframes scrollText{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

@media(max-width:768px){
.titleScroll{font-size:13px;}
}

/* STICKY FILTER + CARDS */
.stickyTop{
position:sticky;
top:0;
z-index:1000;
background:#020617;
padding:10px;
border-bottom:1px solid #1e293b;
}

/* SEARCH */
.search{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
max-width:900px;
margin:auto;
}

@media(max-width:768px){
.search{grid-template-columns:1fr;}
}

.inputBox{
display:flex;
flex-direction:column;
}

.inputBox label{
font-size:12px;
color:#94a3b8;
margin-bottom:5px;
}

.inputIcon{
position:relative;
}

.inputIcon input{
width:100%;
height:30px;
padding:6px 30px 6px 8px;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
font-size:12px;
}

.inputIcon span{
position:absolute;
right:8px;
top:50%;
transform:translateY(-50%);
font-size:14px;
}

select{
width:100%;
height:38px;
padding:8px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:6px;
margin:6px auto;
max-width:900px;
}

.card{
background:linear-gradient(135deg,#0ea5e9,#6366f1);
padding:6px 8px;
border-radius:8px;
text-align:center;
color:white;
font-size:12px;
line-height:1.2;
box-shadow:0 3px 8px rgba(0,0,0,0.4);
}

.card span{
display:block;
font-size:14px;
margin-top:2px;
font-weight:bold;
}

/* TABLE */
.tableArea{
max-height: calc(100vh - 160px); /* adjust according to title + stickyTop height */
overflow-y:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th{
position:sticky;
top:0;
background:#020617;
color:#38bdf8;
padding:8px;
border:1px solid #0ea5e9;
z-index:10;
}

td{
padding:6px;
border:1px solid #334155;
text-align:center;
}

tr:nth-child(even){background:#111827;}
tr:hover{background:#0ea5e9;color:white;}

a{color:#38bdf8;}
</style>
</head>

<body>

<!-- TITLE -->
<div class="titleWrap">
<div class="titleScroll">
M/S Chakraborty Electrical Disconnection Dashboard
</div>
</div>

<!-- FILTER + CARDS -->
<div class="stickyTop">

<div class="search">

<div class="inputBox">
<label>From Date</label>
<div class="inputIcon">
<input type="text" id="from">
<span>📅</span>
</div>
</div>

<div class="inputBox">
<label>To Date</label>
<div class="inputIcon">
<input type="text" id="to">
<span>📅</span>
</div>
</div>

<div class="inputBox">
<label>Sum Column</label>
<select id="sumCol">
<option value="">Select Column</option>
</select>
</div>

</div>

<div class="cards">
<div class="card">
Total Day Disconnection
<span id="rows">0</span>
</div>

<div class="card">
Column Wise Total
<span id="sum">0</span>
</div>
</div>

</div>

<!-- TABLE -->
<div class="tableArea">
<table id="table">
<thead></thead>
<tbody></tbody>
</table>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
setTimeout(()=>{
flatpickr("#from",{dateFormat:"Y-m-d"});
flatpickr("#to",{dateFormat:"Y-m-d"});
},500);

const URL="https://opensheet.elk.sh/1L86gZufZn66SPMcEl5FkY9PwmpKGettvUVUeQESZHRY/Form%20Responses%201";

let data=[],headers=[],DATE_COL="";

fetch(URL)
.then(r=>r.json())
.then(d=>{
data=d;
headers=Object.keys(d[0]);

DATE_COL=headers.find(h=>
h.toLowerCase().includes("date") ||
h.toLowerCase().includes("disconnection")
) || headers[0];

table.querySelector("thead").innerHTML =
"<tr>"+headers.map(h=>`<th>${removeBangla(h)}</th>`).join("")+"</tr>";

headers.forEach(h=>{
let o=document.createElement("option");
o.value=h;
o.text=removeBangla(h);
sumCol.appendChild(o);
});

render(data);
update(data);
});

function removeBangla(text){
return text.replace(/[\u0980-\u09FF]/g,'').trim();
}

function toISO(val){
if(!val) return "";

let d = new Date(val);
if(!isNaN(d)){
return d.toISOString().split('T')[0];
}

let nums=val.toString().match(/\d+/g);
if(!nums || nums.length<3) return "";

let m=nums[0].padStart(2,'0');
let d2=nums[1].padStart(2,'0');
let y=nums[2];
if(y.length===2) y="20"+y;

return `${y}-${m}-${d2}`;
}

function render(d){
table.querySelector("tbody").innerHTML =
d.map(r=>"<tr>"+headers.map(h=>{
let val = removeBangla(r[h]||"");
if(val.startsWith("http")){
return `<td><a href="${val}" target="_blank">View</a></td>`;
}
return `<td>${val}</td>`;
}).join("")+"</tr>").join("");
}

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",filter);
});

function filter(){
let f=from.value,t=to.value;

let res=data.filter(r=>{
let d=toISO(r[DATE_COL]);
if(f && d<f) return false;
if(t && d>t) return false;
return true;
});

render(res);
update(res);
}

function update(d){
rows.innerText=d.length;

let col=sumCol.value,total=0;

if(col){
d.forEach(r=>{
let n=parseFloat((r[col]||"").toString().replace(/[^0-9.]/g,''));
if(!isNaN(n)) total+=n;
});
}

sum.innerText=total;
}

const table=document.getElementById("table");
const sumCol=document.getElementById("sumCol");
const rows=document.getElementById("rows");
const sum=document.getElementById("sum");
</script>

</body>
</html>

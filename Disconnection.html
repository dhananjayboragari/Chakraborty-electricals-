<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.container{
display:flex;
flex-direction:column;
height:100vh;
}

/* TOP */
.top{
position:sticky;
top:0;
z-index:1000;
background:#020617;
padding:20px 15px;
border-bottom:1px solid #1e293b;
}

h2{
text-align:center;
color:#38bdf8;
margin-bottom:20px;
}

/* ?? SEARCH FIXED PERFECT */
.search{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
max-width:900px;
margin:auto;
align-items:end;
}

@media(max-width:768px){
.search{
grid-template-columns:1fr;
}
}

.inputBox{
display:flex;
flex-direction:column;
min-width:0; /* ?? important fix */
}

.inputBox label{
font-size:13px;
color:#94a3b8;
margin-bottom:6px;
}

/* ?? INPUT FIX */
.inputIcon{
position:relative;
width:100%;
}

.inputIcon input{
width:100%;
height:42px;
padding:10px 40px 10px 12px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
font-size:14px;
outline:none;
box-sizing:border-box;
}

/* SVG ICON */
.inputIcon span{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
display:flex;
align-items:center;
}

/* SELECT */
select{
width:100%;
height:42px;
padding:10px 12px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
box-sizing:border-box;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin:25px auto;
max-width:900px;
}

.card{
background:#e5e7eb;
color:black;
padding:15px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

/* TABLE */
.tableArea{
flex:1;
overflow-y:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
position:sticky;
top:0;
background:#020617;
color:#38bdf8;
padding:12px;
border:1px solid #0ea5e9;
}

td{
padding:10px;
border:1px solid #334155;
text-align:center;
}

tr:nth-child(even){background:#111827;}
tr:hover{background:#0ea5e9;color:white;}

a{color:#38bdf8;}
</style>
</head>

<body>

<div class="container">

<div class="top">
<h2> M/S Chakraborty Electrical Disconnection Dashboard</h2>

<div class="search">

<div class="inputBox">
<label>From Date</label>
<div class="inputIcon">
<input type="text" id="from" placeholder="Select date">
<span>
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2">
<rect x="3" y="4" width="18" height="18" rx="2"/>
<line x1="16" y1="2" x2="16" y2="6"/>
<line x1="8" y1="2" x2="8" y2="6"/>
<line x1="3" y1="10" x2="21" y2="10"/>
</svg>
</span>
</div>
</div>

<div class="inputBox">
<label>To Date</label>
<div class="inputIcon">
<input type="text" id="to" placeholder="Select date">
<span>
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2">
<rect x="3" y="4" width="18" height="18" rx="2"/>
<line x1="16" y1="2" x2="16" y2="6"/>
<line x1="8" y1="2" x2="8" y2="6"/>
<line x1="3" y1="10" x2="21" y2="10"/>
</svg>
</span>
</div>
</div>

<div class="inputBox">
<label>Sum Column</label>
<select id="sumCol">
<option value="">Select Column</option>
</select>
</div>

</div>

<div class="cards">
<div class="card">
Total Day Disconnection:<br>
<span id="rows">0</span>
</div>

<div class="card">
Column Wise Total:<br>
<span id="sum">0</span>
</div>
</div>

</div>

<div class="tableArea">
<table id="table">
<thead></thead>
<tbody></tbody>
</table>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>

/* CALENDAR */
flatpickr("#from",{dateFormat:"Y-m-d"});
flatpickr("#to",{dateFormat:"Y-m-d"});

const URL="https://opensheet.elk.sh/1L86gZufZn66SPMcEl5FkY9PwmpKGettvUVUeQESZHRY/Form Responses 1";

let data=[],headers=[],DATE_COL="";

fetch(URL)
.then(r=>r.json())
.then(d=>{

data=d;
headers=Object.keys(d[0]);

DATE_COL=headers.find(h=>
h.toLowerCase().includes("date") ||
h.toLowerCase().includes("disconnection")
);

table.querySelector("thead").innerHTML =
"<tr>"+headers.map(h=>`<th>${removeBangla(h)}</th>`).join("")+"</tr>";

headers.forEach(h=>{
let o=document.createElement("option");
o.value=h;
o.text=removeBangla(h);
sumCol.appendChild(o);
});

render(data);
update(data);

});

function removeBangla(text){
return text.replace(/[\u0980-\u09FF]/g,'').trim();
}

function toISO(val){
if(!val) return "";
let nums=val.toString().match(/\d+/g);
if(!nums || nums.length<3) return "";
let m=nums[0].padStart(2,'0');
let d=nums[1].padStart(2,'0');
let y=nums[2];
if(y.length===2) y="20"+y;
return `${y}-${m}-${d}`;
}

function render(d){
table.querySelector("tbody").innerHTML =
d.map(r=>"<tr>"+headers.map(h=>{
let val = removeBangla(r[h]||"");
if(val.startsWith("http")){
return `<td><a href="${val}" target="_blank">View</a></td>`;
}
return `<td>${val}</td>`;
}).join("")+"</tr>").join("");
}

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",filter);
});

function filter(){
let f=from.value,t=to.value;

let res=data.filter(r=>{
let d=toISO(r[DATE_COL]);
if(f && d<f) return false;
if(t && d>t) return false;
return true;
});

render(res);
update(res);
}

function update(d){
rows.innerText=d.length;

let col=sumCol.value,total=0;

if(col){
d.forEach(r=>{
let n=parseFloat((r[col]||"").toString().replace(/[^0-9.]/g,''));
if(!isNaN(n)) total+=n;
});
}

sum.innerText=total;
}

const table=document.getElementById("table");
const sumCol=document.getElementById("sumCol");
const rows=document.getElementById("rows");
const sum=document.getElementById("sum");

</script>

</body>
</html>

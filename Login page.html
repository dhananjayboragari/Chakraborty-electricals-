<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Chakraborty Electricals</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  /* Body Standard Background */
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f5f5f5; /* Standard office color */
  }

  /* Fade-In Animation for Card */
  .login-card {
    width: 400px;
    padding: 60px 40px 40px 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    position: relative;
    transition: transform 0.3s, opacity 0.5s;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInCard 0.8s forwards;
  }

  @keyframes fadeInCard {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .login-card:hover { transform: translateY(-5px); }

  /* Profile Icon */
  .profile-icon {
    width: 80px;
    height: 80px;
    background: #3b82f6;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: -60px auto 20px auto;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  .profile-icon i { font-size: 36px; color: #fff; }

  .login-card h2 {
    margin-bottom: 30px;
    color: #1f2937;
    font-size: 28px;
    font-weight: 600;
    text-align: center;
  }

  /* Input Group */
  .input-group {
    position: relative;
    margin-bottom: 25px;
  }

  .input-group input {
    width: 100%;
    padding: 14px 15px 14px 45px;
    font-size: 16px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    outline: none;
    transition: all 0.3s;
    background: #fff;
    box-sizing: border-box;
  }

  .input-group input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 8px rgba(59,130,246,0.2);
  }

  .input-group label {
    position: absolute;
    top: 50%;
    left: 45px;
    transform: translateY(-50%);
    background: #fff;
    padding: 0 5px;
    color: #9ca3af;
    font-size: 16px;
    pointer-events: none;
    transition: 0.3s;
  }

  .input-group input:focus + label,
  .input-group input:not(:placeholder-shown) + label {
    top: -10px;
    left: 35px;
    font-size: 12px;
    color: #3b82f6;
  }

  .input-group .icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #3b82f6;
    font-size: 16px;
    pointer-events: none;
  }

  .toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #3b82f6;
    font-size: 16px;
    user-select: none;
  }

  /* Button */
  button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: #fff;
    font-size: 17px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
  }

  button:hover { background: #2563eb; transform: scale(1.02); }

  /* Error Message */
  .error-msg {
    color: #ef4444;
    font-size: 14px;
    margin-top: 10px;
    display: none;
    text-align: center;
    animation: shake 0.3s;
  }

  @keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
  }

  .footer-text {
    margin-top: 20px;
    font-size: 13px;
    color: #6b7280;
    text-align: center;
  }

</style>
</head>
<body>

<div class="login-card">
  <div class="profile-icon">
    <i class="fa-solid fa-user-tie"></i>
  </div>

  <h2>Chakraborty Electricals</h2>

  <div class="input-group">
    <i class="fa-solid fa-user icon"></i>
    <input type="text" id="userId" placeholder=" " required>
    <label>User ID</label>
  </div>

  <div class="input-group">
    <i class="fa-solid fa-lock icon"></i>
    <input type="password" id="password" placeholder=" " required>
    <label>Password</label>
    <span class="toggle-password" onclick="togglePassword()"><i class="fa-regular fa-eye"></i></span>
  </div>

  <button onclick="login()">Login</button>
  <div class="error-msg" id="errorMsg">Invalid User ID & Password</div>

  <div class="footer-text">© 2026 Chakraborty Electricals</div>
</div>

<script>
function login() {
  const userId = document.getElementById('userId').value.trim();
  const password = document.getElementById('password').value.trim();

  if(userId === 'Chakraborty electricals' && password === '501520') {
    window.location.href = 'https://dhananjayboragari.github.io/Chakraborty-electricals-/';
  } else {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.style.display = 'block';
    errorMsg.classList.remove('shake');
    void errorMsg.offsetWidth;
    errorMsg.classList.add('shake');
  }
}

// Enter key-press handling for login
document.getElementById('userId').addEventListener('keypress', function(e){
  if(e.key === 'Enter') login();
});
document.getElementById('password').addEventListener('keypress', function(e){
  if(e.key === 'Enter') login();
});

function togglePassword() {
  const pwd = document.getElementById('password');
  const toggle = document.querySelector('.toggle-password i');
  if(pwd.type === 'password') {
    pwd.type = 'text';
    toggle.className = 'fa-regular fa-eye-slash';
  } else {
    pwd.type = 'password';
    toggle.className = 'fa-regular fa-eye';
  }
}
</script>

</body>
</html>

    /* ==========================================
   NSC Invoice Management System
   style.css
========================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

:root{
--bg:#0f172a;
--card:#162033;
--card2:#1e293b;
--primary:#00c8ff;
--green:#16a34a;
--red:#dc2626;
--yellow:#f59e0b;
--white:#ffffff;
--border:rgba(255,255,255,.12);
}

body{
background:linear-gradient(135deg,#0f172a,#172554,#0f766e,#111827);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:#fff;
display:flex;
min-height:100vh;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Sidebar */

.sidebar{
width:270px;
background:rgba(10,15,30,.75);
backdrop-filter:blur(20px);
padding:25px;
border-right:1px solid var(--border);
position:fixed;
left:0;
top:0;
bottom:0;
overflow:auto;
}

.logo{
display:flex;
align-items:center;
gap:12px;
margin-bottom:35px;
}

.logo i{
font-size:42px;
color:var(--primary);
}

.logo h2{
font-size:26px;
font-weight:700;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:16px 18px;
margin-bottom:12px;
border-radius:12px;
cursor:pointer;
transition:.35s;
display:flex;
align-items:center;
gap:12px;
font-size:15px;
}

.sidebar ul li:hover,
.sidebar ul li.active{
background:rgba(0,200,255,.18);
}

.sidebar ul li i{
width:22px;
text-align:center;
}

/* Main */

.main{
margin-left:270px;
width:calc(100% - 270px);
padding:25px;
}

/* Header */

header{
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid var(--border);
padding:22px 28px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

header h1{
font-size:30px;
}

header p{
color:#d8d8d8;
margin-top:5px;
}

.profile{
display:flex;
align-items:center;
gap:12px;
font-weight:600;
}


    .profile-logo{
width:55px;
height:55px;
border-radius:50%;
object-fit:cover;
border:2px solid #00c8ff;
background:#fff;
}

/* Dashboard */

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card i{
font-size:34px;
color:var(--primary);
margin-bottom:12px;
}

.card h2{
font-size:34px;
margin-bottom:5px;
}

/* Form */

.formCard,
.searchCard{
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
margin-bottom:25px;
}

.formCard h2,
.searchCard h2{
margin-bottom:25px;
display:flex;
align-items:center;
gap:10px;
}


    .grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
width:100%;
}

.full{
grid-column:1/-1;
}

.input{
display:flex;
flex-direction:column;
}

.input label{
margin-bottom:8px;
font-size:14px;
font-weight:600;
}

.input input,
.input textarea,
.input select{
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.06);
color:#fff;
outline:none;
font-size:15px;
transition:.3s;

  width:100%;
max-width:100%;
box-sizing:border-box;
  
}

.input textarea{
height:120px;
resize:none;
}

.input input:focus,
.input textarea:focus,
.input select:focus{
border-color:var(--primary);
box-shadow:0 0 12px rgba(0,200,255,.35);
}

/* Buttons */

.btnArea{
display:flex;
justify-content:center;
gap:15px;
margin-top:30px;
flex-wrap:wrap;
}

.btnArea button,
.searchBox button,
.popupBtn button{
padding:13px 30px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:15px;
font-weight:600;
transition:.3s;
}

#previewBtn{
background:var(--primary);
color:#fff;
}

.btnArea button:last-child{
background:var(--red);
color:#fff;
}

.btnArea button:hover,
.searchBox button:hover,
.popupBtn button:hover{
transform:translateY(-4px);
}

/* Search */

.searchBox{
display:grid;
grid-template-columns:220px 1fr 150px;
gap:15px;
margin-bottom:20px;
}

.searchBox select,
.searchBox input{
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.06);
color:#fff;
outline:none;
}

.searchBox button{
background:var(--green);
color:#fff;
}

/* Preview */

#previewPopup{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.75);
backdrop-filter:blur(8px);
z-index:9999;
}

.previewCard{
width:95%;
max-width:760px;
background:#101828;
border-radius:20px;
padding:30px;
border:1px solid rgba(255,255,255,.12);
animation:popup .3s;
}

@keyframes popup{
from{
transform:scale(.92);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.popupBtn{
display:flex;
justify-content:flex-end;
gap:15px;
margin-top:25px;
}

#editBtn{
background:var(--yellow);
color:#fff;
}

#saveBtn{
background:var(--green);
color:#fff;
}

/* Loader */

#loader{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.82);
z-index:10000;
}

.loaderCircle{
width:70px;
height:70px;
border:6px solid rgba(255,255,255,.15);
border-top:6px solid var(--primary);
border-radius:50%;
animation:spin .8s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* Search Result */

#searchResult{
margin-top:20px;
overflow:auto;
}

    #searchResult table{
width:100%;
border-collapse:collapse;
background:rgba(255,255,255,.08);
}

#searchResult th,
#searchResult td{
padding:12px;
border:1px solid rgba(255,255,255,.15);
text-align:center;
font-size:14px;
}

#searchResult th{
background:#00c8ff;
color:#000;
}

#searchResult tr:hover{
background:rgba(255,255,255,.12);
}

#searchResult button{
padding:8px 15px;
border:none;
border-radius:8px;
background:#f59e0b;
color:white;
cursor:pointer;
}

/* Responsive */

@media(max-width:992px){

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
width:100%;
}

body{
display:block;
}

}

@media(max-width:768px){

header{
flex-direction:column;
gap:15px;
text-align:center;
}

.searchBox{
grid-template-columns:1fr;
}

  #invoiceSearchBox{
flex-direction:column;
}

.searchBox button{
width:100%;
}

.grid{
grid-template-columns:1fr;
}

.btnArea{
flex-direction:column;
}

.btnArea button{
width:100%;
}

.previewCard{
padding:20px;
}

}



    #newInvoiceSection,
#searchSection,
#downloadSection{
display:none;
}



    #successPopup{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.75);
backdrop-filter:blur(8px);
z-index:20000;
}

.successCard{
width:90%;
max-width:450px;
background:#101828;
border-radius:22px;
padding:30px;
text-align:center;
border:1px solid rgba(255,255,255,.15);
animation:popup .3s;
}

.successIcon i{
font-size:70px;
color:#16a34a;
margin-bottom:15px;
}

.successCard h2{
margin-bottom:20px;
}

#successDetails{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:15px;
text-align:left;
line-height:2;
}

.successBtn button{
margin-top:20px;
padding:12px 35px;
border:none;
border-radius:12px;
background:#00c8ff;
color:white;
font-weight:600;
cursor:pointer;
}


    #invoiceSearchBox{
display:flex;
gap:10px;
width:100%;
flex-wrap:wrap;
}

#invoiceSearchBox select,
#invoiceSearchBox input{
flex:1;
width:100%;
min-width:0;
}


    .alertPopup{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.7);
backdrop-filter:blur(8px);
z-index:99999;
}

.alertCard{
width:90%;
max-width:360px;
background:#101828;
padding:25px;
border-radius:18px;
text-align:center;
border:1px solid rgba(255,255,255,.15);
animation:popup .25s ease;
}

.alertCard i{
font-size:60px;
color:#f59e0b;
margin-bottom:15px;
}

.alertCard h2{
margin-bottom:10px;
}

.alertCard p{
margin-bottom:20px;
color:#ddd;
}

.alertCard button{
padding:12px 30px;
border:none;
border-radius:10px;
background:#00c8ff;
color:#fff;
font-weight:600;
cursor:pointer;
}
    
    </style>

// ---------- Auto Total ----------

function calculateTotal(){

let basic=parseFloat(amount.value)||0;

let c=parseFloat(cgst.value)||0;

let s=parseFloat(sgst.value)||0;

let cg=(basic*c)/100;

let sg=(basic*s)/100;

let finalAmount=basic+cg+sg;

total.value=finalAmount.toFixed(2);

}

amount.addEventListener("input",calculateTotal);
cgst.addEventListener("input",calculateTotal);
sgst.addEventListener("input",calculateTotal);


// ---------- Validation ----------

function validateForm(){

if(invoiceDate.value==""){
alert("Select Invoice Date");
invoiceDate.focus();
return false;
}

if(poNo.value==""){
alert("Enter PO Number");
poNo.focus();
return false;
}

if(workName.value==""){
alert("Enter Work Name");
workName.focus();
return false;
}

if(amount.value==""){
alert("Enter Amount");
amount.focus();
return false;
}

return true;

}

document.getElementById("successPopup").style.display="flex";

  editMode = false;

      const invoiceDateObj = new Date(invoiceDate.value);

let fyStart, fyEnd;

if (invoiceDateObj.getMonth() >= 3) { // April = 3
  fyStart = invoiceDateObj.getFullYear();
  fyEnd = fyStart + 1;
} else {
  fyEnd = invoiceDateObj.getFullYear();
  fyStart = fyEnd - 1;
}

const financialYear = `${fyStart}-${fyEnd}`;

const snapshot = await getDocs(collection(db, "Invoices"));

let maxNo = 0;

snapshot.forEach(docSnap => {

  }
});


      // ইউনিক SL No বের করো

let nextSL = 1;

    nextSL = d.slNo + 1;
  }
});

const invoiceNumber =
  financialYear + "/" + String(invoiceSerial).padStart(2, "0");

const docId = financialYear + "-" + String(nextSL).padStart(2, "0");

slNo.value = nextSL;
invoiceNo.value = invoiceNumber;

  try {

invoiceNo: invoiceNumber,

      submitByDivision: submitByDivision.value,
      paymentStatus: paymentStatus.value,
      paymentDate: paymentDate.value,
      createdAt: new Date()
    };

    if (editMode) {

  await updateDoc(doc(db, "Invoices", editDocId), data);

  editMode = false;
  editDocId = "";

} else {

  await setDoc(doc(db, "Invoices", docId), data);

}

    // ===== Financial Year Dropdown Load =====

async function loadFinancialYears(){

  const snapshot = await getDocs(collection(db,"Invoices"));

  const fySelect = document.getElementById("searchFY");

  fySelect.innerHTML =
    '<option value="">Financial Year</option>';

  const years = new Set();

  snapshot.forEach(docSnap=>{
    const d = docSnap.data();

    if(d.financialYear){
      years.add(d.financialYear);
    }
  });

  [...years]
    .sort()
    .reverse()
    .forEach(fy=>{

      const op = document.createElement("option");

      op.value = fy;
      op.textContent = fy;

      fySelect.appendChild(op);

    });

}

loadFinancialYears();

    normalBox.style.display = "none";

      searchValue.type="date";
    }else{
      searchValue.type="text";
    }

    searchValue.value="";
  }

    document.getElementById("excelDownloadBtn").onclick = async () => {
      

  const snapshot = await getDocs(collection(db, "Invoices"));

  let data = [];

  snapshot.forEach(docSnap => {

    const d = docSnap.data();

    data.push({
      "SL No": d.slNo,
      "Invoice No": d.invoiceNo,
      "Invoice Date": d.invoiceDate,
      "PO No": d.poNo,
      "PO Date": d.poDate,
      "Work Name": d.workName,
      "Amount": d.amount,
      "CGST %": d.cgst,
      "SGST %": d.sgst,
      "Total": d.total,
      "Submit Date CCC": d.submitDateCCC,
      "Submit By CCC": d.submitByCCC,
      "Submit Date Division": d.submitDateDivision,
      "Submit By Division": d.submitByDivision,
      "Payment Status": d.paymentStatus,
      "Payment Date": d.paymentDate
    });

  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(data);

  XLSX.utils.book_append_sheet(wb, ws, "Invoices");

  XLSX.writeFile(wb, "NSC_All_Invoices.xlsx");

};

    document.getElementById("pdfDownloadBtn").onclick = async () => {

  const { jsPDF } = window.jspdf;
  const docPDF = new jsPDF("l", "mm", "a4");

  const snapshot = await getDocs(collection(db, "Invoices"));

  let rows = [];

  snapshot.forEach(docSnap => {
    const d = docSnap.data();

    rows.push([
      d.slNo || "",
      d.invoiceNo || "",
      d.invoiceDate || "",
      d.poNo || "",
      d.poDate || "",
      d.workName || "",
      d.amount || "",
      d.cgst || "",
      d.sgst || "",
      d.total || "",
      d.submitDateCCC || "",
      d.submitByCCC || "",
      d.submitDateDivision || "",
      d.submitByDivision || "",
      d.paymentStatus || "",
      d.paymentDate || ""
    ]);
  });

  docPDF.setFontSize(16);
  docPDF.text("NSC All Invoice Report", 14, 15);

  docPDF.autoTable({
    startY: 22,
    head: [[
      "SL",
      "Invoice No",
      "Invoice Date",
      "PO No",
      "PO Date",
      "Work Name",
      "Amount",
      "CGST",
      "SGST",
      "Total",
      "CCC Date",
      "CCC By",
      "Division Date",
      "Division By",
      "Status",
      "Payment Date"
    ]],
    body: rows,
    styles: {
      fontSize: 7
    },
    headStyles: {
      fillColor: [0, 200, 255]
    }
  });

  docPDF.save("NSC_All_Invoices.pdf");

};

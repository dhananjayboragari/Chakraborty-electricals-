<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white;}
.container{display:flex;flex-direction:column;height:100vh;}

.top{
position:sticky;top:0;z-index:1000;
background:#020617;padding:15px 10px;
border-bottom:1px solid #1e293b;
}

h2{text-align:center;color:#38bdf8;margin:10px 0 20px;}

.search{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
max-width:900px;margin:auto 0 20px 0;
}

.inputBox{display:flex;flex-direction:column;margin-bottom:10px;}
.inputBox label{font-size:12px;color:#94a3b8;margin-bottom:5px;}

.inputIcon{position:relative;}
.inputIcon input{
width:100%;padding:10px 30px 10px 8px;
border:none;border-radius:6px;
background:#0f172a;color:white;
margin-bottom:5px;
}
.inputIcon span{
position:absolute;right:8px;top:50%;
transform:translateY(-50%);
}

select{
width:100%;padding:10px;
border:none;border-radius:6px;
background:#0f172a;color:white;
margin-top:5px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;margin:20px auto 30px auto;
max-width:900px;
}

.card{
background:#f1f5f9;color:black;
padding:12px;border-radius:6px;
text-align:center;font-weight:bold;
line-height:1.6; /* spacing between lines in card */
}

.tableArea{flex:1;overflow-y:auto;}

table{width:100%;border-collapse:collapse;}

th{
position:sticky;top:0;
background:#020617;color:#38bdf8;
padding:12px 20px;text-align:center;
letter-spacing:1px;font-weight:600;
white-space:nowrap;border:1px solid #0ea5e9;
}

td{
padding:10px;border:1px solid #334155;
text-align:center;
}

tr:nth-child(even){background:#111827;}
tr:hover{background:#0ea5e9;color:white;}

a{color:#38bdf8;text-decoration:underline;}
</style>
</head>

<body>

<div class="container">

<div class="top">
<h2>📊 M/S Chakraborty Electrical Disconnection Dashboard</h2>

<div class="search">
<div class="inputBox">
<label>From Date</label>
<div class="inputIcon">
<input type="date" id="from"><span>📅</span>
</div>
</div>

<div class="inputBox">
<label>To Date</label>
<div class="inputIcon">
<input type="date" id="to"><span>📅</span>
</div>
</div>

<div class="inputBox">
<label>Sum Column</label>
<select id="sumCol"><option value="">Select Column</option></select>
</div>
</div>

<div class="cards">
<div class="card">
Total Day Disconnection:<br> <span id="rows">0</span>
</div>
<div class="card">
Column Wise Total:<br> <span id="sum">0</span>
</div>
</div>
</div>

<div class="tableArea">
<table id="table">
<thead></thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

const URL="https://opensheet.elk.sh/1L86gZufZn66SPMcEl5FkY9PwmpKGettvUVUeQESZHRY/Form Responses 1";

let data=[],headers=[],DATE_COL="";

fetch(URL)
.then(r=>r.json())
.then(d=>{

data=d;
headers=Object.keys(d[0]);

DATE_COL=headers.find(h=>
h.toLowerCase().includes("date") ||
h.toLowerCase().includes("disconnection")
);

// HEADER (Bangla remove)
table.querySelector("thead").innerHTML =
"<tr>"+headers.map(h=>`<th>${removeBangla(h)}</th>`).join("")+"</tr>";

// DROPDOWN
headers.forEach(h=>{
let o=document.createElement("option");
o.value=h;
o.text=removeBangla(h);
sumCol.appendChild(o);
});

render(data);
update(data);

});

/* 🔥 REMOVE BANGLA FUNCTION */
function removeBangla(text){
return text.replace(/[\u0980-\u09FF]/g,'').trim();
}

/* DATE PARSER */
function toISO(val){
if(!val) return "";
let nums=val.toString().match(/\d+/g);
if(!nums || nums.length<3) return "";
let m=nums[0].padStart(2,'0');
let d=nums[1].padStart(2,'0');
let y=nums[2];
if(y.length===2) y="20"+y;
return `${y}-${m}-${d}`;
}

/* RENDER */
function render(d){
table.querySelector("tbody").innerHTML =
d.map(r=>"<tr>"+headers.map(h=>{

let val = r[h] || "";

/* 🔥 BANGLA REMOVE */
val = removeBangla(val);

/* LINK */
if(val.startsWith("http")){
return `<td><a href="${val}" target="_blank">View</a></td>`;
}

return `<td>${val}</td>`;

}).join("")+"</tr>").join("");
}

/* FILTER */
document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",filter);
});

function filter(){
let f=from.value,t=to.value,active=f||t;

let res=data.filter(r=>{
let d=toISO(r[DATE_COL]);
if(!active) return true;
if(!d) return false;
if(f && d<f) return false;
if(t && d>t) return false;
return true;
});

render(res);
update(res);
}

/* UPDATE */
function update(d){
rows.innerText=d.length;

let col=sumCol.value,total=0;

if(col){
d.forEach(r=>{
let n=parseFloat((r[col]||"").toString().replace(/[^0-9.]/g,''));
if(!isNaN(n)) total+=n;
});
}

sum.innerText=total;
}

const table=document.getElementById("table");
const sumCol=document.getElementById("sumCol");
const rows=document.getElementById("rows");
const sum=document.getElementById("sum");

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#eef2f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#fff;
  padding:30px;
  width:90%;
  max-width:360px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}
.icon-box{
  width:70px;height:70px;
  background:#007bff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
}
.icon-box i{color:#fff;font-size:28px;}
.company{color:#007bff;margin:10px 0;}
.input-box{position:relative;margin:12px 0;}
.left{position:absolute;left:10px;top:50%;transform:translateY(-50%);}
.right{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;}
input{width:100%;padding:12px 40px;border:1px solid #ccc;border-radius:8px;}
button{width:100%;padding:12px;background:#007bff;color:#fff;border:none;border-radius:8px;}
.msg{margin-top:10px;}
</style>
</head>

<body>

<div class="card">
<div class="icon-box"><i class="fas fa-user"></i></div>
<div class="company">M/S Chakraborty Electricals</div>

<h2>Login</h2>

<div class="input-box">
<i class="fas fa-envelope left"></i>
<input id="email" placeholder="Email">
</div>

<div class="input-box">
<i class="fas fa-lock left"></i>
<input id="password" type="password" placeholder="Password">
<i class="fas fa-eye right" onclick="togglePassword()"></i>
</div>

<label><input type="checkbox" id="remember"> Remember Me</label>

<button onclick="login()">Login</button>

<div id="msg" class="msg"></div>
</div>

<script>
// 👁 Toggle
function togglePassword(){
let p=document.getElementById("password");
p.type = p.type==="password" ? "text":"password";
}

// 🔐 Crypto Encrypt
async function encrypt(text){
const enc = new TextEncoder().encode(text);
const key = await crypto.subtle.generateKey(
  {name:"AES-GCM",length:256},
  true,
  ["encrypt","decrypt"]
);
const iv = crypto.getRandomValues(new Uint8Array(12));
const encrypted = await crypto.subtle.encrypt({name:"AES-GCM",iv},key,enc);

return {
  data: Array.from(new Uint8Array(encrypted)),
  iv: Array.from(iv)
};
}

// 🔓 Decrypt
async function decrypt(data,iv,key){
const decrypted = await crypto.subtle.decrypt(
  {name:"AES-GCM",iv:new Uint8Array(iv)},
  key,
  new Uint8Array(data)
);
return new TextDecoder().decode(decrypted);
}

// 🖥️ Device ID
function getDeviceID(){
let id = localStorage.getItem("deviceID");
if(!id){
  id = "DEV-"+Math.random().toString(36).substr(2,9);
  localStorage.setItem("deviceID",id);
}
return id;
}

// 🔥 Load
window.onload = function(){
let email = localStorage.getItem("user");
if(email){
  document.getElementById("email").value = email;
  document.getElementById("remember").checked = true;
}
}

// ⌨ Enter Login
document.addEventListener("keypress",(e)=>{
if(e.key==="Enter") login();
});
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"chakraborty-ele-login.firebaseapp.com"
});

const auth = getAuth();

// 🔥 Login
window.login = async function(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;
let msg = document.getElementById("msg");

msg.innerHTML="⏳ Logging in...";

try{
await signInWithEmailAndPassword(auth,email,password);

// 🖥️ Device Check
let device = getDeviceID();
let savedDevice = localStorage.getItem("lastDevice");

if(savedDevice && savedDevice !== device){
  alert("⚠️ New Device Detected!");
}

localStorage.setItem("lastDevice",device);

// 🔐 Remember
if(document.getElementById("remember").checked){
  localStorage.setItem("user",email);
}

msg.innerHTML="✅ Login Success";
setTimeout(()=>location.href="home.html",1000);

}catch(e){
msg.innerHTML="❌ "+e.message;
}
}
</script>

</body>
</html>

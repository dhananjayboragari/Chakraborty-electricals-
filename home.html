<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}

#profileBtn{
  position:fixed;
  top:15px;
  right:15px;
  background:#007bff;
  color:white;
  border:none;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
}

#profileModal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

#box{
  background:white;
  padding:20px;
  width:320px;
  text-align:center;
  border-radius:15px;
}

#profileImg{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.saveBtn{background:#28a745;color:white;}
.closeBtn{background:#dc3545;color:white;}
.logoutBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff4444;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
}
</style>

</head>

<body>

<button id="profileBtn" onclick="openProfile()">👤</button>
<button class="logoutBtn" onclick="logout()">Logout</button>

<div id="profileModal">
  <div id="box">

    <img id="profileImg" src="https://via.placeholder.com/90"><br>
    <input type="file" id="imageFile"><br>

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <p id="email"></p>

    <button class="saveBtn" onclick="saveProfile()">Save</button>
    <button class="closeBtn" onclick="closeProfile()">Close</button>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 CONFIG */
const app = initializeApp({
  apiKey:"AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain:"chakraborty-ele-login.firebaseapp.com",
  projectId:"chakraborty-ele-login"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 SESSION FIX */
await setPersistence(auth, browserLocalPersistence);

let user = null;
let authReady = false;
let oldImage = "";

/* 🔥 AUTH CHECK */
onAuthStateChanged(auth, (u)=>{
  authReady = true;

  if(u){
    user = u;
    console.log("User:", user.uid);
  }else{
    alert("Login again");
    location.href="index.html";
  }
});

/* WAIT AUTH */
async function waitAuth(){
  while(!authReady){
    await new Promise(r=>setTimeout(r,200));
  }
}

/* OPEN PROFILE */
window.openProfile = async function(){

  await waitAuth();

  if(!user){
    alert("Login required");
    return;
  }

  profileModal.style.display="flex";
  email.innerText = user.email;

  try{
    const snap = await getDoc(doc(db,"users",user.uid));

    if(snap.exists()){
      const d = snap.data();

      name.value = d.name || "";
      phone.value = d.phone || "";
      address.value = d.address || "";

      if(d.photo){
        profileImg.src = d.photo;
        oldImage = d.photo;
      }
    }

  }catch(e){
    console.error(e);
    alert("Load error");
  }
};

/* IMAGE PREVIEW */
imageFile.onchange = ()=>{
  profileImg.src = URL.createObjectURL(imageFile.files[0]);
};

/* IMGBB UPLOAD */
async function uploadImage(file){
  try{
    const apiKey = "5325807c73ecd952ea8069cfd40c82ed";

    let fd = new FormData();
    fd.append("image", file);

    let res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`,{
      method:"POST",
      body:fd
    });

    let data = await res.json();

    if(data.success){
      return data.data.url;
    }else{
      throw "Upload failed";
    }

  }catch(err){
    alert("Image upload failed");
    return oldImage;
  }
}

/* SAVE PROFILE */
window.saveProfile = async function(){

  await waitAuth();

  if(!user){
    alert("Login required");
    return;
  }

  try{

    let file = imageFile.files[0];
    let img = oldImage;

    if(file){
      img = await uploadImage(file);
    }

    await setDoc(doc(db,"users",user.uid),{
      name: name.value.trim(),
      phone: phone.value.trim(),
      address: address.value.trim(),
      email: user.email,
      photo: img
    });

    alert("✅ Profile Saved");
    profileModal.style.display="none";

  }catch(e){
    console.error(e);
    alert("❌ Save failed");
  }
};

/* CLOSE */
window.closeProfile = ()=>{
  profileModal.style.display="none";
};

/* LOGOUT */
window.logout = async function(){
  await signOut(auth);
  location.href="index.html";
};

</script>

</body>
</html>

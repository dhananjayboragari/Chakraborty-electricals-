<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home</title>
<style>
body{
  font-family:Arial;
  background:#f4f6f9;
  margin:0;
  padding:20px;
}

.box{
  max-width:400px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{text-align:center;}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

button:hover{background:#0056b3;}

#dashboard p{
  background:#f1f1f1;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<h3 id="status">Loading...</h3>

<!-- PROFILE -->
<div id="profileBox" class="box" style="display:none;">
  <h2>Complete Profile</h2>

  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="agency" placeholder="Agency">

  <button onclick="saveProfile()">Save Profile</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box" style="display:none;">
  <h2>Dashboard</h2>

  <p><b>Name:</b> <span id="dname"></span></p>
  <p><b>Phone:</b> <span id="dphone"></span></p>
  <p><b>Agency:</b> <span id="dagency"></span></p>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
});

const auth = getAuth(app);
const db = getFirestore(app);

// ================= MAIN CHECK =================
onAuthStateChanged(auth, async (user)=>{

  if(!user){
    window.location.href="index.html";
    return;
  }

  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);

  document.getElementById("status").style.display="none";

  // ❌ profile not exist
  if(!snap.exists()){
    showProfile();
    return;
  }

  const data = snap.data();

  // ❌ not complete
  if(data.profileComplete !== true){
    showProfile();
    return;
  }

  showDashboard(data);
});

// ================= SAVE PROFILE =================
window.saveProfile = async function(){

  const user = auth.currentUser;

  await setDoc(doc(db,"users",user.uid),{
    name:name.value,
    phone:phone.value,
    agency:agency.value,
    profileComplete:true
  });

  showDashboard({
    name:name.value,
    phone:phone.value,
    agency:agency.value
  });
}

// ================= LOGOUT =================
window.logout = async function(){
  await signOut(auth);
  window.location.href="index.html";
}

// ================= UI FUNCTIONS =================
function showProfile(){
  profileBox.style.display="block";
  dashboard.style.display="none";
}

function showDashboard(data){
  profileBox.style.display="none";
  dashboard.style.display="block";

  dname.innerText=data.name;
  dphone.innerText=data.phone;
  dagency.innerText=data.agency;
}

</script>

</body>
</html>

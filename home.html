<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home</title>
</head>

<body>

<h3 id="status">Loading...</h3>

<!-- ================= PROFILE FORM ================= -->
<div id="profileBox" style="display:none;">
  <h2>Complete Your Profile</h2>

  <input id="name" placeholder="Name"><br><br>
  <input id="phone" placeholder="Phone"><br><br>
  <input id="agency" placeholder="Agency"><br><br>

  <button onclick="saveProfile()">Save Profile</button>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="homeBox" style="display:none;">
  <h2>Dashboard</h2>

  <p><b>Name:</b> <span id="dname"></span></p>
  <p><b>Phone:</b> <span id="dphone"></span></p>
  <p><b>Agency:</b> <span id="dagency"></span></p>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ================= MAIN CHECK =================
onAuthStateChanged(auth, async (user) => {

  if(!user){
    window.location.href = "index.html";
    return;
  }

  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  document.getElementById("status").style.display = "none";

  // ❌ profile does not exist
  if(!snap.exists()){
    showProfile();
    return;
  }

  const data = snap.data();

  // ❌ profile incomplete
  if(data.profileComplete !== true){
    showProfile();
    return;
  }

  // ✅ dashboard
  showHome(data);
});

// ================= SAVE PROFILE =================
window.saveProfile = async function(){

  const user = auth.currentUser;

  await setDoc(doc(db,"users",user.uid),{
    name: name.value,
    phone: phone.value,
    agency: agency.value,
    profileComplete: true
  });

  showHome({
    name: name.value,
    phone: phone.value,
    agency: agency.value
  });
}

// ================= LOGOUT =================
window.logout = async function(){
  const auth = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js");
  location.href = "index.html";
}

// ================= UI CONTROL =================
function showProfile(){
  profileBox.style.display = "block";
  homeBox.style.display = "none";
}

function showHome(data){
  profileBox.style.display = "none";
  homeBox.style.display = "block";

  dname.innerText = data.name;
  dphone.innerText = data.phone;
  dagency.innerText = data.agency;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submission Page</title>

<style>

body{
  margin:0;
  font-family:Arial;
  min-height:100vh;
  overflow:hidden;
  background:#0f2027;
  color:white;
  display:flex;
  justify-content:center;
  align-items:flex-start; 
  padding-top:250px; /* Sun-এর নিচে buttons রাখতে adjust */
  position:relative;
}

canvas#solarBg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* CONTAINER */
.container{
  display:flex;
  flex-direction:column;
  gap:20px;
  max-width:360px;
  width:100%;
}

/* CARD */
.card-border{
  padding:1.5px;
  border-radius:20px;
  background:linear-gradient(270deg,red,orange,yellow,green,cyan,blue,violet);
  background-size:400% 400%;
  animation:borderMove 12s linear infinite;
}

@keyframes borderMove{
  100%{background-position:400%}
}

.card-btn{
  background:white;
  border-radius:16px;
  padding:18px;
  text-align:center;
}

.card-btn img{width:55px;}

a{text-decoration:none;color:black;display:block;}

/* ✅ PROFILE BUTTON MODERN */
#profileBtn{
  position:fixed;
  top:10px;
  right:10px;

  padding:8px 10px;
  border:none;
  border-radius:16px;

  cursor:pointer;
  z-index:999;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;

  width:auto;
  min-width:52px;

  background:rgba(0, 255, 204, 0.15);
  backdrop-filter: blur(10px);

  border:1px solid rgba(0,255,204,0.4);

  box-shadow: 0 0 12px rgba(0,255,204,0.3);
}

#profileBtn .icon{
  font-size:18px;
  width:34px;
  height:34px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:50%;

  background: linear-gradient(135deg,#00ffcc,#0077ff);
  box-shadow: 0 0 10px rgba(0,255,204,0.5);
}

#profileName{
  font-size:10px;
  color:white;
  max-width:90px;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* MODAL */
#profileModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
  justify-content:center;
  align-items:center;
}

#profileBox{
  width:320px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  color:white;
  text-align:center;
}

#profileBox input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
}

.saveBtn{background:#00ffcc;}
.closeBtn{background:red;color:white;}

/* POPUP */
#customPopup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.popupBox{
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  text-align:center;
  width:280px;
}

.popupBox button{
  margin-top:10px;
  padding:8px;
  background:#00c896;
  color:white;
  border:none;
  border-radius:8px;
}



/* MOBILE RESPONSIVE */
@media (max-width: 600px) {

  body{
    padding-top:250px; /* sun gap কমানো */
  }

  .container{
    max-width:90%;
    gap:12px;
  }

  .card-btn{
    padding:12px;   /* আগের 18px ছিল */
  }

  .card-btn img{
    width:40px;     /* আগের 55px ছিল */
  }

  .card-btn h3{
    font-size:18px;
  }

  #profileBtn{
    transform: scale(0.85);
    top:8px;
    right:8px;
  }
}


                  
</style>
</head>

<body>

<canvas id="solarBg"></canvas>
  
<!-- PROFILE BUTTON -->
<button id="profileBtn" onclick="openProfile()">
  <div class="icon">👨‍💼</div>
  <div id="profileName">Profile</div>
</button>

<!-- PROFILE MODAL -->
<div id="profileModal" onclick="closeProfile()">
  <div id="profileBox" onclick="event.stopPropagation()">

    <h3>Profile</h3>

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <p id="email"></p>
    <p id="uid"></p>

    <button class="saveBtn" onclick="saveProfile()">Save</button>
    <button class="closeBtn" onclick="closeProfile()">Close</button>

  </div>
</div>

<!-- POPUP -->
<div id="customPopup">
  <div class="popupBox">
    <p id="popupText"></p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<canvas id="solarBg"></canvas>

<div class="container">
  <a href="submit report.html">
    <div class="card-border">
      <div class="card-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png">
        <h3>Submit Report</h3>
      </div>
    </div>
  </a>

  <a href="view report.html">
    <div class="card-border">
      <div class="card-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/3050/3050525.png">
        <h3>All Reports</h3>
      </div>
    </div>
  </a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain: "chakraborty-ele-login.firebaseapp.com",
  projectId: "chakraborty-ele-login",
  appId: "1:414542805581:web:cfd13593767abbb51cba04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

onAuthStateChanged(auth, async (u) => {
  if (u) {
    user = u;

    const snap = await getDoc(doc(db, "users", user.uid));

    if (snap.exists()) {
      const data = snap.data();

      document.getElementById("profileName").innerText =
        data.name ? data.name : "Profile";

      const isComplete =
        data.name && data.phone && data.address;

      if (!isComplete) {
        setTimeout(() => openProfile(true), 500);
      }

    } else {
      setTimeout(() => openProfile(true), 500);
    }
  }
});

window.openProfile = async function (force=false) {
  if (!user) return;

  document.getElementById("profileModal").style.display = "flex";

  const snap = await getDoc(doc(db, "users", user.uid));

  if (snap.exists()) {
    const data = snap.data();

    document.getElementById("name").value = data.name || "";
    document.getElementById("phone").value = data.phone || "";
    document.getElementById("address").value = data.address || "";
  }

  document.getElementById("email").innerText = "Email: " + user.email;
  document.getElementById("uid").innerText = "UID: " + user.uid;

  if (force) {
    showPopup("Please complete your profile!");
  }
};

window.saveProfile = async function () {

  await setDoc(doc(db, "users", user.uid), {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    email: user.email,
    uid: user.uid
  }, { merge: true });

  document.getElementById("profileName").innerText =
    document.getElementById("name").value || "Profile";

  showPopup("Profile Saved!");
  document.getElementById("profileModal").style.display = "none";
};

window.closeProfile = function () {
  document.getElementById("profileModal").style.display = "none";
};

window.showPopup = function(msg){
  document.getElementById("popupText").innerText = msg;
  document.getElementById("customPopup").style.display = "flex";
}

window.closePopup = function(){
  document.getElementById("customPopup").style.display = "none";
};
</script>

<script>
// Solar Background with Orbiting Planets
const canvas = document.getElementById("solarBg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Stars
let stars = [];
for(let i=0;i<200;i++){
  stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, speed: Math.random()*0.05+0.02});
}

// Sun
let sun = { x: canvas.width/2, y: 100, r: 80 };

// Planets
let planets = [
  { r: 8, distance: 130, angle: Math.random()*Math.PI*2, speed:0.005, color:"#FF4500"},
  { r: 12, distance: 180, angle: Math.random()*Math.PI*2, speed:0.003, color:"#1E90FF"},
  { r: 6, distance: 220, angle: Math.random()*Math.PI*2, speed:0.007, color:"#32CD32"}
];

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Sun
  let grad = ctx.createRadialGradient(sun.x,sun.y,0,sun.x,sun.y,sun.r);
  grad.addColorStop(0,"#FFD700");
  grad.addColorStop(0.6,"#FF8C00");
  grad.addColorStop(1,"transparent");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(sun.x,sun.y,sun.r,0,Math.PI*2);
  ctx.fill();

  // Sun Rays
  for(let i=0;i<20;i++){
    let angle = Date.now()/1000 + i*Math.PI/10;
    ctx.strokeStyle = `rgba(255,215,0,0.08)`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sun.x,sun.y);
    ctx.lineTo(sun.x + Math.cos(angle)*150, sun.y + Math.sin(angle)*150);
    ctx.stroke();
  }

  // Planets
  planets.forEach(p=>{
    p.angle += p.speed;
    let px = sun.x + Math.cos(p.angle)*p.distance;
    let py = sun.y + Math.sin(p.angle)*p.distance;

    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI*2);
    ctx.fill();

    // Orbit path
    ctx.strokeStyle="rgba(255,255,255,0.05)";
    ctx.beginPath();
    ctx.arc(sun.x,sun.y,p.distance,0,Math.PI*2);
    ctx.stroke();
  });

  // Stars
  stars.forEach(s=>{
    s.x += s.speed;
    if(s.x>canvas.width) s.x=0;
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  sun.x = canvas.width/2;
});



</script>

</body>
</html>

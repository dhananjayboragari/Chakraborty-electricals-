<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submission Page</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:20px;
  color:#fff;

  background: url("https://i.ibb.co/sdNSg0QZ/Amazing-Wallpapers-For-Phone.jpg") no-repeat center center fixed;
  background-size:cover;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.05);
  z-index:-1;
}

.container{
  display:flex;
  flex-direction:column;
  gap:12px; 
  max-width:400px; 
  width:100%;
  margin:auto;
  margin-top:60px;
}

/* HEADER */
.page-header{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  z-index:100;
  width:95%;
  max-width:900px;
  padding:14px 26px;
  border-radius:40px;
  background: linear-gradient(270deg,#00c6ff,#7b2ff7,#ff4d88,#ff7f50,#00c6ff);
  background-size:400% 400%;
  animation: gradientFlow 8s ease infinite;
  text-align:center;
}

.page-header h1{margin:0;font-size:28px;}

#profileNameTag{
  position:fixed;
  top:65px;
  right:10px;
  font-size:12px;
  color:white;
}

/* PROFILE BUTTON */
#profileBtn{
  position:fixed;
  top:18px;
  right:15px;

  width:42px;
  height:42px;

  border-radius:50%;
  border:none;
  cursor:pointer;

  background: linear-gradient(135deg,#00ffcc,#0077ff);
  box-shadow:0 0 12px rgba(0,255,204,0.6);

  font-size:18px;
}

/* MODAL */
#profileModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:2000;
}

#profileBox{
  width:320px;
  padding:20px;
  border-radius:12px;
  background:white;
  color:black;
}

#profileBox input{
  width:100%;
  margin:6px 0;
  padding:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
}

.saveBtn{background:#00ffcc;border:none;}
.closeBtn{background:red;color:white;border:none;}

.card-box{position:relative;}
.card-border{padding:1.5px;border-radius:20px;background: linear-gradient(90deg, #FF7F50, #FF6347);}
.card-btn{
  background:#fff;
  border-radius:16px;
  height:120px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.card-btn img{max-width:60%;}
.card-btn h3{color:#222;margin:0;}
a{text-decoration:none;}
</style>
</head>

<body>

<header class="page-header">
  <h1>Welcome to Dhupguri CCC</h1>
</header>

<div id="profileNameTag">Profile</div>
<button id="profileBtn">👤</button>

<!-- PROFILE MODAL -->
<div id="profileModal">
  <div id="profileBox">

    <h3>Profile</h3>

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <p id="email"></p>
    <p id="uid"></p>

    <button class="saveBtn" onclick="saveProfile()">Save</button>
    <button class="closeBtn" onclick="closeProfile()">Close</button>

  </div>
</div>

<div class="container">
  <a href="#"><div class="card-border"><div class="card-btn"><img src=""><h3>Button 1</h3></div></div></a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCZd10BUgRR9IEQ2kENQ_bXZiThegHRY-I",
  authDomain: "dhupguri-ccc.firebaseapp.com",
  projectId: "dhupguri-ccc",
  storageBucket: "dhupguri-ccc.firebasestorage.app",
  messagingSenderId: "278611213070",
  appId: "1:278611213070:web:f9652c7965f472164c355f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* 🔥 AUTO CHECK PROFILE */
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  currentUser = user;

  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  let data = snap.exists() ? snap.data() : null;

  document.getElementById("email").innerText = user.email;
  document.getElementById("uid").innerText = user.uid;

  const name = data?.name || "";
  document.getElementById("profileNameTag").innerText = name || "Profile";

  const isComplete =
    data && data.name && data.phone && data.address;

  if (!isComplete) {
    setTimeout(() => {
      openProfile(true);
    }, 600);
  }
});

/* OPEN PROFILE */
window.openProfile = function(force=false){
  document.getElementById("profileModal").style.display = "flex";
  if(force) alert("Please complete your profile!");
};

/* SAVE PROFILE */
window.saveProfile = async function(){

  await setDoc(doc(db,"users",currentUser.uid),{
    name:document.getElementById("name").value,
    phone:document.getElementById("phone").value,
    address:document.getElementById("address").value,
    email:currentUser.email,
    uid:currentUser.uid
  },{merge:true});

  document.getElementById("profileNameTag").innerText =
    document.getElementById("name").value;

  alert("Profile Saved!");
  closeProfile();
};

window.closeProfile = function(){
  document.getElementById("profileModal").style.display = "none";
};

document.getElementById("profileBtn").onclick = () => openProfile();
</script>

</body>
</html>

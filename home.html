<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
</head>
<body>

<h2>Profile</h2>

<img id="userPhoto" width="100"><br><br>

<h3 id="userName"></h3>
<h4 id="userEmail"></h4>

<input type="file" id="uploadPhoto"><br><br>

<button onclick="logout()">Logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain: "chakraborty-ele-login.firebaseapp.com",
  projectId: "chakraborty-ele-login",
  storageBucket: "chakraborty-ele-login.firebasestorage.app",
  messagingSenderId: "414542805581",
  appId: "1:414542805581:web:cfd13593767abbb51cba04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// 🔥 Load profile
onAuthStateChanged(auth, async (user) => {
  if(user){

    const docSnap = await getDoc(doc(db,"users",user.uid));

    if(docSnap.exists()){
      const data = docSnap.data();

      document.getElementById("userName").innerText = data.name;
      document.getElementById("userEmail").innerText = data.email;

      if(data.photo){
        document.getElementById("userPhoto").src = data.photo;
      }
    }

  } else {
    window.location.href = "login.html";
  }
});

// 🔥 Upload photo
document.getElementById("uploadPhoto").addEventListener("change", async (e)=>{
  const file = e.target.files[0];
  const user = auth.currentUser;

  const storageRef = ref(storage, "profileImages/"+user.uid);
  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  // update firestore
  await updateDoc(doc(db,"users",user.uid),{
    photo: url
  });

  // update auth
  await updateProfile(user,{
    photoURL: url
  });

  document.getElementById("userPhoto").src = url;

  alert("Photo Updated ✅");
});

// 🔥 Logout
window.logout = function(){
  signOut(auth);
  window.location.href = "login.html";
}
</script>

</body>
</html>

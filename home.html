<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Single Page App</title>
</head>

<body>

<!-- ================= LOGIN VIEW ================= -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="loginUser()">Login</button>
  <p id="msg"></p>
</div>

<!-- ================= PROFILE SETUP ================= -->
<div id="profileBox" style="display:none;">
  <h2>Complete Profile</h2>
  <input id="name" placeholder="Name"><br><br>
  <input id="phone" placeholder="Phone"><br><br>
  <input id="agency" placeholder="Agency"><br><br>
  <button onclick="saveProfile()">Save</button>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="homeBox" style="display:none;">
  <h2>Dashboard</h2>
  <p>Name: <span id="dname"></span></p>
  <p>Phone: <span id="dphone"></span></p>
  <p>Agency: <span id="dagency"></span></p>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ================= LOGIN =================
window.loginUser = async function(){

  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth, email, pass);
    document.getElementById("msg").innerText = "Login success";
  }catch(e){
    document.getElementById("msg").innerText = e.message;
  }
}

// ================= SAVE PROFILE =================
window.saveProfile = async function(){

  const user = auth.currentUser;

  await setDoc(doc(db, "users", user.uid), {
    name: name.value,
    phone: phone.value,
    agency: agency.value,
    profileComplete: true
  });

  showHome(user);
}

// ================= LOGOUT =================
window.logout = async function(){
  await signOut(auth);
  location.reload();
}

// ================= MAIN LOGIC =================
onAuthStateChanged(auth, async (user) => {

  if(!user){
    showLogin();
    return;
  }

  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  // ❌ no profile
  if(!snap.exists()){
    showProfile();
    return;
  }

  const data = snap.data();

  // ❌ incomplete
  if(data.profileComplete !== true){
    showProfile();
    return;
  }

  // ✅ profile done
  showHome(user, data);
});


// ================= UI CONTROL =================
function showLogin(){
  loginBox.style.display = "block";
  profileBox.style.display = "none";
  homeBox.style.display = "none";
}

function showProfile(){
  loginBox.style.display = "none";
  profileBox.style.display = "block";
  homeBox.style.display = "none";
}

function showHome(user, data){
  loginBox.style.display = "none";
  profileBox.style.display = "none";
  homeBox.style.display = "block";

  document.getElementById("dname").innerText = data?.name || "";
  document.getElementById("dphone").innerText = data?.phone || "";
  document.getElementById("dagency").innerText = data?.agency || "";
}

</script>

</body>
</html>

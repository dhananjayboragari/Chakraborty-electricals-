<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f2027;
  color:white;
}

#profileBtn{
  position:fixed;
  top:10px;
  right:10px;
  background:#00ffcc;
  border:none;
  padding:6px 10px;
  border-radius:15px;
}

#profileModal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

#profileBox{
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

#profileImg{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
}

input{
  width:100%;
  margin:5px 0;
  padding:8px;
}

button{
  width:100%;
  margin-top:5px;
  padding:8px;
}
</style>
</head>

<body>

<button id="profileBtn" onclick="openProfile()">👤 Profile</button>

<div id="profileModal">
  <div id="profileBox">

    <img id="profileImg" src="https://via.placeholder.com/80"><br>
    <input type="file" id="imageFile">

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <p id="email"></p>
    <p id="uid"></p>

    <button onclick="saveProfile()">Save</button>
    <button onclick="closeProfile()">Close</button>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let userLoaded = false;
let oldImage = "";

/* AUTH FIX */
onAuthStateChanged(auth, async (u) => {
  if (u) {
    user = u;
    userLoaded = true;
    console.log("User Loaded:", user.uid);
  } else {
    alert("Login again");
    window.location.href = "index.html";
  }
});

/* OPEN PROFILE */
window.openProfile = async function () {

  if (!userLoaded) {
    alert("Wait...");
    return;
  }

  profileModal.style.display = "flex";

  email.innerText = user.email;
  uid.innerText = user.uid;

  const snap = await getDoc(doc(db, "users", user.uid));

  if (snap.exists()) {
    const data = snap.data();

    name.value = data.name || "";
    phone.value = data.phone || "";
    address.value = data.address || "";

    if (data.photo) {
      profileImg.src = data.photo;
      oldImage = data.photo;
    }
  }
};

/* IMAGE PREVIEW */
imageFile.onchange = () => {
  const file = imageFile.files[0];
  if (file) profileImg.src = URL.createObjectURL(file);
};

/* IMGBB */
async function uploadToImgBB(file) {
  const apiKey = "6094dcb16d1f9a749d1293721f5305af";

  let formData = new FormData();
  formData.append("image", file);

  let res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
    method: "POST",
    body: formData
  });

  let data = await res.json();
  return data.data.url;
}

/* SAVE */
window.saveProfile = async function () {

  if (!userLoaded) {
    alert("User not ready");
    return;
  }

  let file = imageFile.files[0];
  let finalImage = oldImage;

  if (file) {
    finalImage = await uploadToImgBB(file);
  }

  await setDoc(doc(db, "users", user.uid), {
    name: name.value,
    phone: phone.value,
    address: address.value,
    email: user.email,
    uid: user.uid,
    photo: finalImage
  });

  alert("Saved Successfully");

  profileBtn.innerHTML =
    `<img src="${finalImage}" style="width:25px;height:25px;border-radius:50%;">`;

  profileModal.style.display = "none";
};

window.closeProfile = function () {
  profileModal.style.display = "none";
};
</script>

</body>
</html>

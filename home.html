<!DOCTYPE html>
<html>
<head>
  <title>Profile Page</title>
</head>

<body>

<h2>User Profile</h2>

<img id="photo" width="100" height="100" style="border-radius:50%"><br><br>

<p><b>Name:</b> <span id="name">Loading...</span></p>
<p><b>Email:</b> <span id="email">Loading...</span></p>

<button onclick="logout()">Logout</button>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// Profile Load
onAuthStateChanged(auth, async (user) => {
  if (user) {

    email.innerText = user.email;

    // Firestore থেকে data আনবো
    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const data = docSnap.data();

      name.innerText = data.name || "No Name";
      photo.src = data.photoURL || "https://via.placeholder.com/100";
    } else {
      name.innerText = "No profile data";
      photo.src = "https://via.placeholder.com/100";
    }

  } else {
    window.location.href = "login.html";
  }
});


// Logout
window.logout = function() {
  signOut(auth);
}

</script>

</body>
</html>

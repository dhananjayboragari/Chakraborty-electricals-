<!DOCTYPE html>
<html>
<head>
  <title>Profile Dashboard</title>
</head>

<body>

<h2>My Profile</h2>

<img id="photo" width="100" height="100" style="border-radius:50%; background:#ddd;"><br><br>

<p>Email: <span id="email">Loading...</span></p>

<input type="text" id="name" placeholder="Enter Name"><br><br>
<input type="text" id="photoURL" placeholder="Enter Photo URL"><br><br>

<button onclick="saveProfile()">Save Profile</button>
<button onclick="logout()">Logout</button>

<p id="status"></p>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔥 তোমার Firebase config বসাও
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// UI
const emailEl = document.getElementById("email");
const nameEl = document.getElementById("name");
const photoEl = document.getElementById("photo");
const photoInput = document.getElementById("photoURL");
const status = document.getElementById("status");

let uid = null;


// 👤 USER CHECK
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html"; // তোমার login page
    return;
  }

  uid = user.uid;

  emailEl.innerText = user.email;

  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const data = snap.data();

    nameEl.value = data.name || "";
    photoInput.value = data.photoURL || "";
    photoEl.src = data.photoURL || "https://via.placeholder.com/100";

  } else {
    await setDoc(ref, {
      email: user.email,
      name: "",
      photoURL: ""
    });

    photoEl.src = "https://via.placeholder.com/100";
  }
});


// 💾 SAVE PROFILE
window.saveProfile = async function () {

  const ref = doc(db, "users", uid);

  try {
    await updateDoc(ref, {
      name: nameEl.value || "",
      photoURL: photoInput.value || ""
    });

    photoEl.src = photoInput.value || "https://via.placeholder.com/100";

    status.innerText = "Profile Updated Successfully ✅";

  } catch (e) {
    await setDoc(ref, {
      name: nameEl.value || "",
      photoURL: photoInput.value || "",
      email: emailEl.innerText
    });

    status.innerText = "Profile Created & Saved ✅";
  }
};


// 🚪 LOGOUT
window.logout = function () {
  signOut(auth);
};

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<style>
body{font-family:Arial;margin:0;}

#btn{
  position:fixed;
  top:10px;
  right:10px;
  padding:10px;
  border-radius:50%;
  background:#007bff;
  color:white;
  border:none;
}

#modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  padding:15px;
  width:280px;
  border-radius:10px;
  text-align:center;
}

img{
  width:70px;
  height:70px;
  border-radius:50%;
}
input{
  width:100%;
  padding:8px;
  margin:5px 0;
}
button{
  width:100%;
  padding:8px;
}
</style>
</head>

<body>

<button id="btn" onclick="openProfile()">👤</button>

<div id="modal">
  <div class="box">

    <img id="img"><br>
    <input type="file" id="file"><br>

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <p id="email"></p>

    <button onclick="save()">Save</button>
    <button onclick="closeModal()">Close</button>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, doc, getDoc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* CONFIG */
const app = initializeApp({
  apiKey: "YOUR_KEY",
  authDomain: "chakraborty-ele-login.firebaseapp.com",
  projectId: "chakraborty-ele-login"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 FIX SESSION */
await setPersistence(auth, browserLocalPersistence);

let user;
let oldPhoto = "";

/* AUTH CHECK */
onAuthStateChanged(auth, (u)=>{
  if(u){
    user = u;
  }else{
    location.href = "index.html";
  }
});

/* OPEN */
window.openProfile = async function(){
  modal.style.display="flex";
  email.innerText = user.email;

  const snap = await getDoc(doc(db,"users",user.uid));

  if(snap.exists()){
    let d = snap.data();

    name.value = d.name || "";
    phone.value = d.phone || "";
    address.value = d.address || "";

    if(d.photo){
      img.src = d.photo;
      oldPhoto = d.photo;
    }
  }
};

/* PREVIEW */
file.onchange = ()=>{
  img.src = URL.createObjectURL(file.files[0]);
};

/* IMGBB UPLOAD */
async function upload(file){
  const key = "5325807c73ecd952ea8069cfd40c82ed";

  let fd = new FormData();
  fd.append("image", file);

  let res = await fetch(`https://api.imgbb.com/1/upload?key=${key}`,{
    method:"POST",
    body:fd
  });

  let data = await res.json();
  return data.data.url;
}

/* SAVE */
window.save = async function(){

  let photo = oldPhoto;

  if(file.files[0]){
    photo = await upload(file.files[0]);
  }

  await setDoc(doc(db,"users",user.uid),{
    name: name.value,
    phone: phone.value,
    address: address.value,
    email: user.email,
    photo: photo
  });

  alert("Saved ✅");
  modal.style.display="none";
};

window.closeModal = ()=> modal.style.display="none";

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submission Page</title>

<style>
body{
  margin:0;
  font-family:Arial;
  min-height:100vh;
  overflow:hidden;
  background:#0f2027;
  color:white;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:250px;
}

/* BACKGROUND */
canvas#solarBg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* CONTAINER */
.container{
  display:flex;
  flex-direction:column;
  gap:20px;
  max-width:360px;
  width:100%;
}

/* CARD */
.card-border{
  padding:1.5px;
  border-radius:20px;
  background:linear-gradient(270deg,red,orange,yellow,green,cyan,blue,violet);
  background-size:400% 400%;
  animation:borderMove 12s linear infinite;
}

@keyframes borderMove{
  100%{background-position:400%}
}

.card-btn{
  background:white;
  border-radius:16px;
  padding:18px;
  text-align:center;
  color:black;
}

.card-btn img{width:55px;}

a{text-decoration:none;color:black;display:block;}

/* PROFILE BUTTON */
#profileBtn{
  position:fixed;
  top:12px;
  right:12px;
  padding:6px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  z-index:999;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:rgba(0,255,204,0.15);
  border:1px solid rgba(0,255,204,0.4);
  backdrop-filter:blur(10px);
}

#profileBtn .icon{
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:linear-gradient(135deg,#00ffcc,#0077ff);
}

#profileName{
  font-size:10px;
  max-width:80px;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* MODAL */
#profileModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:2000;
}

#profileBox{
  width:300px;
  padding:20px;
  border-radius:16px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(12px);
  text-align:center;
}

#profileBox input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
}

.saveBtn{background:#00ffcc;}
.closeBtn{background:red;color:white;}

/* POPUP */
#customPopup{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  z-index:3000;
}

.popupBox{
  background:white;
  color:black;
  padding:18px;
  border-radius:10px;
  width:260px;
  text-align:center;
}
</style>
</head>

<body>

<!-- PROFILE BUTTON -->
<button id="profileBtn" onclick="openProfile()">
  <div class="icon">👤</div>
  <div id="profileName">Profile</div>
</button>

<!-- PROFILE MODAL -->
<div id="profileModal" onclick="closeProfile()">
  <div id="profileBox" onclick="event.stopPropagation()">

    <h3>Profile</h3>

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <p id="email"></p>
    <p id="uid"></p>

    <button class="saveBtn" onclick="saveProfile()">Save</button>
    <button class="closeBtn" onclick="closeProfile()">Close</button>

  </div>
</div>

<!-- POPUP -->
<div id="customPopup">
  <div class="popupBox">
    <p id="popupText"></p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<canvas id="solarBg"></canvas>

<div class="container">
  <a href="submit report.html">
    <div class="card-border">
      <div class="card-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png">
        <h3>Submit Report</h3>
      </div>
    </div>
  </a>

  <a href="view report.html">
    <div class="card-border">
      <div class="card-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/3050/3050525.png">
        <h3>All Reports</h3>
      </div>
    </div>
  </a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain: "chakraborty-ele-login.firebaseapp.com",
  projectId: "chakraborty-ele-login",
  appId: "1:414542805581:web:cfd13593767abbb51cba04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

onAuthStateChanged(auth, async (u) => {
  if (!u) return;

  user = u;

  const snap = await getDoc(doc(db, "users", user.uid));

  if (snap.exists()) {
    const data = snap.data();

    document.getElementById("profileName").innerText =
      data.name || "Profile";

    if (!data.name || !data.phone || !data.address) {
      setTimeout(() => openProfile(true), 500);
    }

  } else {
    setTimeout(() => openProfile(true), 500);
  }
});

window.openProfile = async function(force=false){
  if (!user) return;

  document.getElementById("profileModal").style.display = "flex";

  const snap = await getDoc(doc(db,"users",user.uid));

  if (snap.exists()){
    const d = snap.data();
    name.value = d.name || "";
    phone.value = d.phone || "";
    address.value = d.address || "";
  }

  email.innerText = "Email: " + user.email;
  uid.innerText = "UID: " + user.uid;

  if(force){
    showPopup("Please complete your profile!");
  }
};

window.saveProfile = async function(){
  await setDoc(doc(db,"users",user.uid),{
    name:name.value,
    phone:phone.value,
    address:address.value,
    email:user.email,
    uid:user.uid
  },{merge:true});

  profileName.innerText = name.value || "Profile";

  showPopup("Profile Saved!");
  closeProfile();
};

window.closeProfile = function(){
  document.getElementById("profileModal").style.display="none";
};

window.showPopup = function(msg){
  popupText.innerText = msg;
  customPopup.style.display="flex";
};

window.closePopup = function(){
  customPopup.style.display="none";
};
</script>

<script>
const canvas=document.getElementById("solarBg");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let sun={x:canvas.width/2,y:100,r:80};

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let g=ctx.createRadialGradient(sun.x,sun.y,0,sun.x,sun.y,sun.r);
  g.addColorStop(0,"#FFD700");
  g.addColorStop(1,"transparent");

  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(sun.x,sun.y,sun.r,0,Math.PI*2);
  ctx.fill();

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>

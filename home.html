<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Profile</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f2027;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#00ffcc;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h3>👤 Profile</h3>

  <input type="text" id="name" placeholder="Enter Name">

  <p id="email">Loading...</p>
  <p id="uid"></p>

  <button onclick="saveProfile()">Save Name</button>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain: "chakraborty-ele-login.firebaseapp.com",
  projectId: "chakraborty-ele-login",
  appId: "1:414542805581:web:cfd13593767abbb51cba04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

/* LOAD USER */
onAuthStateChanged(auth, async (user)=>{
  if(user){
    currentUser = user;

    document.getElementById("email").innerText = "Email: " + user.email;
    document.getElementById("uid").innerText = "UID: " + user.uid;

    const snap = await getDoc(doc(db, "users", user.uid));

    if(snap.exists()){
      document.getElementById("name").value = snap.data().name || "";
    }
  }
});

/* SAVE NAME */
window.saveProfile = async function(){
  let name = document.getElementById("name").value;

  await setDoc(doc(db, "users", currentUser.uid), {
    name: name,
    email: currentUser.email,
    uid: currentUser.uid
  });

  alert("Name Saved!");
};

/* LOGOUT */
window.logout = function(){
  signOut(auth);
  window.location.href = "index.html";
};
</script>

</body>
</html>

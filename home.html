<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f2027;
  color:white;
  overflow:hidden;
}

/* BACKGROUND */
canvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:-1;
}

/* PROFILE BUTTON (same design) */
#profileBtn{
  position:fixed;
  top:10px;
  right:10px;
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;
  background:rgba(0,255,204,0.2);
  color:#00ffcc;
  font-size:16px;
}

/* CARDS */
.container{
  margin-top:200px;
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
}

.card{
  width:260px;
  padding:20px;
  text-align:center;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
}

a{text-decoration:none;color:white;}

/* PROFILE MODAL */
#profileModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

#profileBox{
  width:300px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
}

input{
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  border-radius:10px;
}

/* POPUP (same simple design) */
#popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popupBox{
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
}
</style>
</head>

<body>

<button id="profileBtn" onclick="openProfile()">👤</button>

<div class="container">
  <a href="submit report.html">
    <div class="card">Submit Report</div>
  </a>

  <a href="view report.html">
    <div class="card">All Reports</div>
  </a>
</div>

<!-- PROFILE -->
<div id="profileModal">
  <div id="profileBox">

    <h3>Profile</h3>

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <button onclick="saveProfile()">Save</button>
    <button onclick="closeProfile()">Close</button>

  </div>
</div>

<!-- POPUP -->
<div id="popup">
  <div class="popupBox">
    <p id="msg"></p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore,doc,getDoc,setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"YOUR KEY",
  authDomain:"YOUR DOMAIN",
  projectId:"YOUR ID",
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let user;

onAuthStateChanged(auth, async(u)=>{
  if(u){
    user=u;

    const snap=await getDoc(doc(db,"users",u.uid));

    if(snap.exists()){
      const data=snap.data();

      // 🔥 username show (FIRST LETTER)
      if(data.name){
        document.getElementById("profileBtn").innerText =
          data.name.charAt(0).toUpperCase();
      }
    }else{
      openProfile();
    }
  }
});

window.openProfile=function(){
  document.getElementById("profileModal").style.display="flex";
}

window.closeProfile=function(){
  document.getElementById("profileModal").style.display="none";
}

window.saveProfile=async function(){
  const userName = document.getElementById("name").value;

  await setDoc(doc(db,"users",user.uid),{
    name:userName,
    phone:phone.value,
    address:address.value
  });

  // 🔥 instant update button
  document.getElementById("profileBtn").innerText =
    userName ? userName.charAt(0).toUpperCase() : "👤";

  showPopup("Saved Successfully");
  closeProfile();
}

function showPopup(t){
  msg.innerText=t;
  document.getElementById("popup").style.display="flex";
}

window.closePopup=function(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}

#profileBtn{
  position:fixed;
  top:10px;
  right:10px;
  background:#007bff;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

/* 🔥 SMALL POPUP */
#profileModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

#box{
  width:260px;
  background:#fff;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

#profileImg{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:8px;
}

input{
  width:100%;
  padding:8px;
  margin:4px 0;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:13px;
}

button{
  width:100%;
  padding:8px;
  margin-top:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.save{background:#28a745;color:white;}
.close{background:#dc3545;color:white;}

</style>
</head>

<body>

<button id="profileBtn" onclick="openProfile()">👤</button>

<div id="profileModal">
  <div id="box">

    <img id="profileImg" src="https://via.placeholder.com/70"><br>
    <input type="file" id="imageFile">

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <p id="email" style="font-size:12px;"></p>

    <button class="save" onclick="saveProfile()">Save</button>
    <button class="close" onclick="closeProfile()">Close</button>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* CONFIG */
const app = initializeApp({
  apiKey:"AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain:"chakraborty-ele-login.firebaseapp.com",
  projectId:"chakraborty-ele-login"
});

const auth = getAuth();
const db = getFirestore();

let user = null;
let oldImage = "";

/* AUTH */
onAuthStateChanged(auth, (u)=>{
  if(u){
    user = u;
  }else{
    location.href="index.html";
  }
});

/* OPEN */
window.openProfile = async function(){

  if(!user){
    alert("Login first");
    return;
  }

  profileModal.style.display="flex";
  email.innerText = user.email;

  try{
    const snap = await getDoc(doc(db,"users",user.uid));

    if(snap.exists()){
      const d = snap.data();

      name.value = d.name || "";
      phone.value = d.phone || "";
      address.value = d.address || "";

      if(d.photo){
        profileImg.src = d.photo;
        oldImage = d.photo;
      }
    }

  }catch(e){
    alert("Load error");
  }
};

/* PREVIEW */
imageFile.onchange = ()=>{
  profileImg.src = URL.createObjectURL(imageFile.files[0]);
};

/* UPLOAD */
async function upload(file){
  try{
    const key="5325807c73ecd952ea8069cfd40c82ed";

    let fd=new FormData();
    fd.append("image",file);

    let r=await fetch(`https://api.imgbb.com/1/upload?key=${key}`,{
      method:"POST",
      body:fd
    });

    let d=await r.json();
    return d.data.url;

  }catch{
    return oldImage;
  }
}

/* SAVE */
window.saveProfile = async function(){

  if(!user){
    alert("Login first");
    return;
  }

  try{

    let file=imageFile.files[0];
    let img=oldImage;

    if(file){
      img=await upload(file);
    }

    await setDoc(doc(db,"users",user.uid),{
      name:name.value,
      phone:phone.value,
      address:address.value,
      email:user.email,
      photo:img
    });

    alert("Saved");
    profileModal.style.display="none";

  }catch(e){
    alert("Save failed");
  }
};

window.closeProfile=()=>{
  profileModal.style.display="none";
};
</script>

</body>
</html>

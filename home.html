<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submission Page with Planets</title>

<style>
body{
  margin:0;
  font-family:Arial;
  min-height:100vh;
  overflow:hidden;
  background:#0f2027;
  color:white;
  display:flex;
  justify-content:center;
  align-items:flex-start; 
  padding-top:250px;
  position:relative;
}

canvas#solarBg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

.container{
  display:flex;
  flex-direction:column;
  gap:20px;
  max-width:360px;
  width:100%;
  z-index:1;
  position:relative;
}

.card-box{
  position:relative;
}

.card-border{
  padding:1.5px;
  border-radius:20px;
  background:linear-gradient(270deg,red,orange,yellow,green,cyan,blue,violet);
  background-size:400% 400%;
  animation:borderMove 12s linear infinite;
}

@keyframes borderMove{
  0%{background-position:0%}
  100%{background-position:400%}
}

.card-btn{
  background:white;
  border-radius:16px;
  padding:18px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.3);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.card-btn:active{
  transform: scale(0.90);
  box-shadow:0 2px 6px rgba(0,0,0,0.5);
}

.card-btn img{
  width:55px;
  margin-bottom:10px;
}

.card-btn h3{
  margin:0;
  font-size:15px;
}

a{text-decoration:none; color:black; display:block;}

/* PROFILE BUTTON */
#profileBtn{
  position:fixed;
  top:10px;
  right:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00ffcc;
  font-weight:bold;
  cursor:pointer;
  z-index:999;
}

/* PROFILE MODAL */
#profileModal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#profileBox{
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

#profileBox input{
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<!-- PROFILE BUTTON -->
<button id="profileBtn" onclick="openProfile()">👤 Profile</button>

<!-- PROFILE MODAL -->
<div id="profileModal" onclick="closeProfile()">
  <div id="profileBox" onclick="event.stopPropagation()">

    <h3>👤 Profile</h3>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="phone" placeholder="Enter Phone">
    <input type="text" id="address" placeholder="Enter Address">

    <p id="email">Loading...</p>
    <p id="uid"></p>

    <button onclick="saveProfile()">Save / Update</button>
    <button onclick="closeProfile()">Close</button>
  </div>
</div>

<canvas id="solarBg"></canvas>

<div class="container">

  <div class="card-box">
    <a href="submit report.html">
      <div class="card-border">
        <div class="card-btn">
          <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png">
          <h3>Submit Report</h3>
        </div>
      </div>
    </a>
  </div>

  <div class="card-box">
    <a href="view report.html">
      <div class="card-border">
        <div class="card-btn">
          <img src="https://cdn-icons-png.flaticon.com/512/3050/3050525.png">
          <h3>All Reports Views</h3>
        </div>
      </div>
    </a>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain: "chakraborty-ele-login.firebaseapp.com",
  projectId: "chakraborty-ele-login",
  appId: "1:414542805581:web:cfd13593767abbb51cba04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

/* USER */
onAuthStateChanged(auth, (user)=>{
  if(user){
    currentUser = user;
    document.getElementById("email").innerText = "Email: " + user.email;
    document.getElementById("uid").innerText = "UID: " + user.uid;
  }
});

/* OPEN PROFILE */
window.openProfile = async function(){
  if(!currentUser) return alert("Not logged in!");

  document.getElementById("profileModal").style.display = "flex";

  const snap = await getDoc(doc(db, "users", currentUser.uid));

  if(snap.exists()){
    let data = snap.data();
    document.getElementById("name").value = data.name || "";
    document.getElementById("phone").value = data.phone || "";
    document.getElementById("address").value = data.address || "";
  }
};

/* SAVE / UPDATE PROFILE */
window.saveProfile = async function(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  await setDoc(doc(db, "users", currentUser.uid), {
    name,
    phone,
    address,
    email: currentUser.email,
    uid: currentUser.uid
  }, { merge: true });

  alert("Profile Saved / Updated!");
};

/* CLOSE */
window.closeProfile = function(){
  document.getElementById("profileModal").style.display = "none";
};
</script>

<!-- SOLAR ANIMATION (UNCHANGED) -->
<script>
const canvas = document.getElementById("solarBg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for(let i=0;i<200;i++){
  stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, speed: Math.random()*0.05+0.02});
}

let sun = { x: canvas.width/2, y: 100, r: 80 };

let planets = [
  { r: 8, distance: 130, angle: Math.random()*Math.PI*2, speed:0.005, color:"#FF4500"},
  { r: 12, distance: 180, angle: Math.random()*Math.PI*2, speed:0.003, color:"#1E90FF"},
  { r: 6, distance: 220, angle: Math.random()*Math.PI*2, speed:0.007, color:"#32CD32"}
];

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let grad = ctx.createRadialGradient(sun.x,sun.y,0,sun.x,sun.y,sun.r);
  grad.addColorStop(0,"#FFD700");
  grad.addColorStop(1,"transparent");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(sun.x,sun.y,sun.r,0,Math.PI*2);
  ctx.fill();

  planets.forEach(p=>{
    p.angle += p.speed;
    let px = sun.x + Math.cos(p.angle)*p.distance;
    let py = sun.y + Math.sin(p.angle)*p.distance;

    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI*2);
    ctx.fill();
  });

  stars.forEach(s=>{
    s.x += s.speed;
    if(s.x>canvas.width) s.x=0;
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>

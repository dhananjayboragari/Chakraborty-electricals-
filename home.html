<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Page</title>

<style>
body{
  font-family: Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  color:white;
  margin:0;
}

.profile-box{
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  text-align:center;
  width: 340px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.profile-box img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
  border:2px solid white;
}

.profile-box input{
  width: 100%;
  padding: 10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

.profile-box input:focus{
  outline:none;
  border:2px solid #00ffcc;
}

button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

#updateBtn{
  background: linear-gradient(90deg,#00ffcc,#ff00ff);
  color:black;
  width:100%;
}

#logoutBtn{
  background:red;
  color:white;
  width:100%;
  margin-top:8px;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}
</style>
</head>

<body>

<div class="profile-box">
  <h2>My Profile</h2>

  <img id="photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

  <input type="file" id="photoInput">

  <p id="name">Loading name...</p>
  <p id="email">Loading email...</p>

  <input type="text" id="nameEdit" placeholder="Edit Name">

  <button id="updateBtn" disabled>Update Profile</button>
  <button id="logoutBtn">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;

const updateBtn = document.getElementById("updateBtn");
const nameEdit = document.getElementById("nameEdit");

onAuthStateChanged(auth, async (user)=>{
  if(user){
    currentUser = user;

    document.getElementById("email").innerText = "Email: " + user.email;

    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if(docSnap.exists()){
      const data = docSnap.data();

      document.getElementById("name").innerText = "Name: " + (data.name || "");
      nameEdit.value = data.name || "";

      if(data.photo){
        document.getElementById("photo").src = data.photo;
      }
    }

    updateBtn.disabled = false;

  } else {
    window.location.href = "login.html";
  }
});

// Enable button on change
nameEdit.addEventListener("input", ()=>{
  updateBtn.disabled = false;
});

document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await signOut(auth);
  window.location.href = "login.html";
});

updateBtn.addEventListener("click", async ()=>{

  try {
    if(!currentUser) return;

    const newName = nameEdit.value.trim();

    if(!newName){
      alert("Name cannot be empty");
      return;
    }

    updateBtn.innerText = "Updating...";
    updateBtn.disabled = true;

    const file = document.getElementById("photoInput").files[0];

    const docRef = doc(db, "users", currentUser.uid);

    let updateData = {
      name: newName
    };

    // upload photo if exists
    if(file){
      const storageRef = ref(storage, `profileImages/${currentUser.uid}_${Date.now()}`);
      await uploadBytes(storageRef, file);

      const photoURL = await getDownloadURL(storageRef);

      updateData.photo = photoURL;
      document.getElementById("photo").src = photoURL;
    }

    await updateDoc(docRef, updateData);

    document.getElementById("name").innerText = "Name: " + newName;

    alert("Profile Updated ✅");

    updateBtn.innerText = "Update Profile";
    updateBtn.disabled = false;

  } catch (err) {
    console.error(err);
    alert("Update failed ❌ Check console");

    updateBtn.innerText = "Update Profile";
    updateBtn.disabled = false;
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Page</title>

<style>
body{
  font-family: Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  color:white;
  flex-direction: column;
  margin:0;
}

.profile-box{
  background: rgba(255,255,255,0.1);
  padding: 30px 40px;
  border-radius: 20px;
  text-align:center;
  width: 320px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.profile-box img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:15px;
  border:2px solid white;
}

.profile-box input{
  width: 100%;
  padding: 8px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

button{
  padding:10px 20px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background: linear-gradient(90deg,#00ffcc,#ff00ff);
  color:black;
  font-weight:bold;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}
</style>
</head>

<body>

<div class="profile-box">
  <h2>Profile</h2>

  <img id="photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

  <input type="file" id="photoInput">

  <p id="name">Loading name...</p>
  <p id="email">Loading email...</p>

  <input type="text" id="nameEdit" placeholder="Edit Name">

  <button id="updateBtn" disabled>Update Profile</button>
  <button id="logoutBtn">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain: "chakraborty-ele-login.firebaseapp.com",
  projectId: "chakraborty-ele-login",
  storageBucket: "chakraborty-ele-login.firebasestorage.app",
  messagingSenderId: "414542805581",
  appId: "1:414542805581:web:cfd13593767abbb51cba04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;

const updateBtn = document.getElementById("updateBtn");

onAuthStateChanged(auth, async (user)=>{
  if(user){
    currentUser = user;

    document.getElementById("email").innerText = "Email: " + user.email;

    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if(docSnap.exists()){
      const data = docSnap.data();

      document.getElementById("name").innerText = "Name: " + data.name;
      document.getElementById("nameEdit").value = data.name || "";

      if(data.photo){
        document.getElementById("photo").src = data.photo;
      }
    }

    updateBtn.disabled = false;

  } else {
    window.location.href = "login.html";
  }
});

document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await signOut(auth);
  window.location.href = "login.html";
});

updateBtn.addEventListener("click", async ()=>{
  try {
    if(!currentUser) return alert("User not loaded");

    const newName = document.getElementById("nameEdit").value;
    const file = document.getElementById("photoInput").files[0];

    const docRef = doc(db, "users", currentUser.uid);

    let updateData = {
      name: newName
    };

    if(file){
      const storageRef = ref(storage, `profileImages/${currentUser.uid}`);
      await uploadBytes(storageRef, file);

      const photoURL = await getDownloadURL(storageRef);

      updateData.photo = photoURL;
      document.getElementById("photo").src = photoURL;
    }

    await updateDoc(docRef, updateData);

    document.getElementById("name").innerText = "Name: " + newName;

    alert("Profile Updated ✅");

  } catch (err) {
    console.error(err);
    alert("Update failed ❌ Console check করো");
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Dashboard</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#1f1c2c,#928dab);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CARD */
.card{
  width:320px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:20px;
  color:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{transform:translateY(30px); opacity:0;}
  to{transform:translateY(0); opacity:1;}
}

/* PROFILE IMAGE */
.card img{
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid white;
  object-fit:cover;
  margin-bottom:10px;
}

/* INPUTS */
input{
  width:90%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  outline:none;
}

/* BUTTON */
button{
  width:95%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#0072ff;
  transform:scale(1.03);
}

/* WARNING */
#warning{
  font-size:12px;
  color:yellow;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="card">

  <img id="photo" src="https://via.placeholder.com/100">

  <h3 id="email">Loading...</h3>

  <input type="text" id="name" placeholder="Enter your name">
  <input type="text" id="photoURL" placeholder="Photo URL">

  <p id="warning"></p>

  <button onclick="saveProfile()">Save Profile</button>
  <button onclick="logout()" style="background:#ff4b5c;">Logout</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔥 Firebase config (তোমারটা বসাও)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// UI
const emailEl = document.getElementById("email");
const nameEl = document.getElementById("name");
const photoEl = document.getElementById("photo");
const photoInput = document.getElementById("photoURL");
const warning = document.getElementById("warning");

let uid = null;


// LOAD PROFILE
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  uid = user.uid;
  emailEl.innerText = user.email;

  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const data = snap.data();

    nameEl.value = data.name || "";
    photoInput.value = data.photoURL || "";
    photoEl.src = data.photoURL || "https://via.placeholder.com/100";

  } else {
    await setDoc(ref, {
      email: user.email,
      name: "",
      photoURL: ""
    });
  }

  checkWarning();
});


// SAVE PROFILE
window.saveProfile = async function () {

  const ref = doc(db, "users", uid);

  await updateDoc(ref, {
    name: nameEl.value || "",
    photoURL: photoInput.value || ""
  }).catch(async () => {
    await setDoc(ref, {
      email: emailEl.innerText,
      name: nameEl.value || "",
      photoURL: photoInput.value || ""
    });
  });

  photoEl.src = photoInput.value || "https://via.placeholder.com/100";

  checkWarning();
};


// WARNING CHECK
function checkWarning(){
  if(!nameEl.value || !photoInput.value){
    warning.innerText = "⚠️ Please complete your profile";
  }else{
    warning.innerText = "";
  }
}


// LOGOUT
window.logout = function(){
  signOut(auth);
};

</script>

</body>
</html>

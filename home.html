<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submission Page</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:20px;
  background:url("https://i.ibb.co/sdNSg0QZ/Amazing-Wallpapers-For-Phone.jpg") no-repeat center center fixed;
  background-size:cover;
}

/* HEADER */
.page-header{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:95%;
  max-width:900px;
  padding:14px;
  border-radius:40px;
  background:linear-gradient(270deg,#00c6ff,#7b2ff7,#ff4d88,#ff7f50);
  text-align:center;
}

/* 🔥 PROFILE BUTTON (MODERN UI) */
#profileBtn{
  position:fixed;
  top:15px;
  right:15px;

  width:48px;
  height:48px;
  border-radius:50%;
  border:none;
  cursor:pointer;

  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);

  box-shadow:0 0 15px rgba(0,255,204,0.5);
  font-size:20px;

  transition:0.25s;
}

#profileBtn:hover{
  transform:scale(1.1) rotate(5deg);
  box-shadow:0 0 25px rgba(0,255,204,0.9);
}

/* name tag */
#profileNameTag{
  position:fixed;
  top:70px;
  right:10px;
  font-size:11px;
  padding:4px 8px;
  border-radius:10px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(8px);
  color:#fff;
  max-width:120px;
  overflow:hidden;
}

/* container */
.container{
  display:flex;
  flex-direction:column;
  gap:12px;
  max-width:400px;
  width:100%;
  margin-top:80px;
}

/* cards (FULL RESTORED STYLE) */
.card-border{
  padding:2px;
  border-radius:18px;
  background:linear-gradient(90deg,#ff7f50,#ff6347);
}

.card-btn{
  background:#fff;
  border-radius:14px;
  height:110px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.card-btn img{
  width:40px;
  height:40px;
  object-fit:contain;
  margin-bottom:5px;
}

.card-btn h3{
  font-size:13px;
  margin:0;
  color:#222;
}

/* modal */
#profileModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

#profileBox{
  width:320px;
  background:#fff;
  padding:20px;
  border-radius:15px;
}

#profileBox input{
  width:100%;
  padding:10px;
  margin:6px 0;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
}

.saveBtn{background:#00ffcc;border:none;}
.closeBtn{background:red;color:#fff;border:none;}
</style>
</head>

<body>

<header class="page-header">
  <h1>Welcome to Dhupguri CCC</h1>
</header>

<!-- PROFILE UI -->
<button id="profileBtn">👤</button>
<div id="profileNameTag">Profile</div>

<!-- PROFILE MODAL -->
<div id="profileModal">
  <div id="profileBox">
    <h3>User Profile</h3>

    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <p id="email"></p>
    <p id="uid"></p>

    <button class="saveBtn" onclick="saveProfile()">Save</button>
    <button class="closeBtn" onclick="closeProfile()">Close</button>
  </div>
</div>

<!-- ALL BUTTONS (FULL RESTORED - NO MISSING) -->
<div class="container">

  <a href="nsc related submission.html"><div class="card-border"><div class="card-btn"><img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png"><h3>NSC RELATED SUBMISSION</h3></div></div></a>

  <a href="maintenance related submission.html"><div class="card-border"><div class="card-btn"><img src="https://cdn-icons-png.flaticon.com/512/3050/3050525.png"><h3>MAINTENANCE RELATED SUBMISSION</h3></div></div></a>

  <a href="duare sarkar related.html"><div class="card-border"><div class="card-btn"><img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png"><h3>DUARE SARKAR RELATED</h3></div></div></a>

  <a href="all estimate submission.html"><div class="card-border"><div class="card-btn"><img src="https://cdn-icons-png.flaticon.com/512/3050/3050525.png"><h3>ALL ESTIMATE SUBMISSION</h3></div></div></a>

  <a href="meter replacement.html"><div class="card-border"><div class="card-btn"><img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png"><h3>METER REPLACEMENT</h3></div></div></a>

  <a href="download.html"><div class="card-border"><div class="card-btn"><img src="https://cdn-icons-png.flaticon.com/512/3050/3050525.png"><h3>DOWNLOAD</h3></div></div></a>

  <a href="send feedback.html"><div class="card-border"><div class="card-btn"><img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png"><h3>SEND FEEDBACK</h3></div></div></a>

  <a href="contact us.html"><div class="card-border"><div class="card-btn"><img src="https://cdn-icons-png.flaticon.com/512/3050/3050525.png"><h3>CONTACT US</h3></div></div></a>

</div>

<!-- FIREBASE FULL LOGIC -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCZd10BUgRR9IEQ2kENQ_bXZiThegHRY-I",
  authDomain: "dhupguri-ccc.firebaseapp.com",
  projectId: "dhupguri-ccc",
  storageBucket: "dhupguri-ccc.firebasestorage.app",
  messagingSenderId: "278611213070",
  appId: "1:278611213070:web:f9652c7965f472164c355f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

/* AUTO PROFILE CHECK (IMPORTANT LOGIC) */
onAuthStateChanged(auth, async (u)=>{
  if(!u) return;

  user = u;

  const snap = await getDoc(doc(db,"users",user.uid));
  const data = snap.exists() ? snap.data() : null;

  email.innerText = user.email;
  uid.innerText = user.uid;

  profileNameTag.innerText = data?.name || "Profile";

  const isComplete = data?.name && data?.phone && data?.address;

  if(!isComplete){
    setTimeout(()=>openProfile(true),600);
  }
});

/* OPEN */
window.openProfile = function(force=false){
  profileModal.style.display="flex";
  if(force) alert("Please complete your profile!");
};

/* SAVE */
window.saveProfile = async function(){

  await setDoc(doc(db,"users",user.uid),{
    name:name.value,
    phone:phone.value,
    address:address.value,
    email:user.email,
    uid:user.uid
  },{merge:true});

  profileNameTag.innerText = name.value;

  closeProfile();
  alert("Profile Saved!");
};

/* CLOSE */
window.closeProfile = function(){
  profileModal.style.display="none";
};

document.getElementById("profileBtn").onclick = ()=>openProfile();
</script>

</body>
</html>

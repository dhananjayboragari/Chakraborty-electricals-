<!DOCTYPE html>
<html>
<head>
  <title>Auto Profile System</title>
</head>

<body>

<h2>Profile Dashboard</h2>

<img id="photo" width="100" height="100"
style="border-radius:50%; background:#ddd;"><br><br>

<p>Email: <span id="email"></span></p>

<p id="warning" style="color:red;"></p>

<input type="text" id="name" placeholder="Enter Name"><br><br>
<input type="text" id="photoURL" placeholder="Enter Photo URL"><br><br>

<button onclick="saveProfile()">Save / Update</button>
<button onclick="logout()">Logout</button>

<p id="status"></p>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// UI
const emailEl = document.getElementById("email");
const nameEl = document.getElementById("name");
const photoEl = document.getElementById("photo");
const photoInput = document.getElementById("photoURL");
const warning = document.getElementById("warning");
const status = document.getElementById("status");

let uid = null;


// 👤 LOAD USER
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  uid = user.uid;
  emailEl.innerText = user.email;

  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const data = snap.data();

    nameEl.value = data.name || "";
    photoInput.value = data.photoURL || "";
    photoEl.src = data.photoURL || "https://via.placeholder.com/100";

  } else {
    // নতুন user create
    await setDoc(ref, {
      email: user.email,
      name: "",
      photoURL: ""
    });

    photoEl.src = "https://via.placeholder.com/100";
  }

  checkWarning();
});


// ⚠️ Warning check function
function checkWarning() {

  if (!nameEl.value || !photoInput.value) {
    warning.innerText = "⚠️ Please update your profile (Name + Photo missing)";
  } else {
    warning.innerText = "";
  }
}


// 💾 SAVE / AUTO UPDATE
window.saveProfile = async function () {

  const ref = doc(db, "users", uid);

  const name = nameEl.value.trim();
  const photo = photoInput.value.trim();

  try {
    await updateDoc(ref, {
      name: name,
      photoURL: photo
    });

  } catch {
    await setDoc(ref, {
      email: emailEl.innerText,
      name: name,
      photoURL: photo
    });
  }

  // 🔥 INSTANT UI UPDATE
  photoEl.src = photo || "https://via.placeholder.com/100";

  status.innerText = "Profile Updated ✅";

  checkWarning();
};


// 🔄 LIVE UPDATE WHILE TYPING (AUTO UI)
nameEl.addEventListener("input", checkWarning);
photoInput.addEventListener("input", checkWarning);


// 🚪 LOGOUT
window.logout = function () {
  signOut(auth);
};

</script>

</body>
</html>

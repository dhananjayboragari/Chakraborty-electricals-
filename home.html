<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup Page</title>
<style>
body{
  font-family: Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  color:white;
  flex-direction: column;
  margin:0;
}

.signup-box{
  background: rgba(255,255,255,0.1);
  padding: 30px 40px;
  border-radius: 20px;
  text-align:center;
  width: 300px;
}

.signup-box input{
  width: 100%;
  padding: 8px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

button{
  padding:10px 20px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background: linear-gradient(90deg,#00ffcc,#ff00ff);
  color:black;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="signup-box">
  <h2>Signup</h2>
  <input type="text" id="name" placeholder="Enter Name"><br>
  <input type="email" id="email" placeholder="Enter Email"><br>
  <input type="password" id="password" placeholder="Enter Password (6+ chars)"><br>
  <input type="file" id="photo" accept="image/*"><br>
  <button onclick="signup()">Signup</button>
  <p>Already have account? <a href="login.html">Login</a></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBzsxNsxx3RwN94Sxxz_dXRQwMbll6Cg10",
  authDomain: "chakraborty-ele-login.firebaseapp.com",
  projectId: "chakraborty-ele-login",
  storageBucket: "chakraborty-ele-login.firebasestorage.app",
  messagingSenderId: "414542805581",
  appId: "1:414542805581:web:cfd13593767abbb51cba04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

window.signup = async function() {
  try {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const file = document.getElementById("photo").files[0];

    if(!name || !email || !password){
      alert("All fields are required!");
      return;
    }

    if(password.length < 6){
      alert("Password must be at least 6 characters!");
      return;
    }

    // 🔥 Create user
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    // 🔥 Upload photo if selected
    let photoURL = "";
    if(file){
      const storageRef = ref(storage, `profileImages/${user.uid}`);
      await uploadBytes(storageRef, file);
      photoURL = await getDownloadURL(storageRef);
    }

    // 🔥 Save in Firestore
    await setDoc(doc(db, "users", user.uid), {
      name: name,
      email: email,
      photo: photoURL
    });

    alert("Signup Success ✅");
    window.location.href = "login.html";

  } catch(error) {
    console.error(error);
    alert("Signup Failed: " + error.message);
  }
}
</script>

</body>
</html>
